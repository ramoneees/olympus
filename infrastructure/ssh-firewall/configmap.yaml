apiVersion: v1
kind: ConfigMap
metadata:
  name: ssh-firewall-scripts
  namespace: kube-system
data:
  ensure-ssh.sh: |
    #!/bin/sh
    set -e

    # Use nsenter to run iptables on the host
    IPT="nsenter -t 1 -n -- iptables"

    RULE="-p tcp --dport 22 -j ACCEPT"

    ensure_ssh_rule() {
      # Check if our SSH ACCEPT rule already exists
      if $IPT -C INPUT $RULE 2>/dev/null; then
        echo "$(date): SSH ACCEPT rule already exists"
        return 0
      fi

      # Find the first REJECT rule in INPUT chain
      REJECT_LINE=$($IPT -L INPUT --line-numbers -n | grep -m1 'REJECT' | awk '{print $1}')

      if [ -n "$REJECT_LINE" ]; then
        # Insert SSH ACCEPT before the first REJECT
        $IPT -I INPUT "$REJECT_LINE" $RULE
        echo "$(date): Inserted SSH ACCEPT rule at line $REJECT_LINE (before REJECT)"
      else
        # No REJECT rule found, append to INPUT
        $IPT -A INPUT $RULE
        echo "$(date): Appended SSH ACCEPT rule (no REJECT found)"
      fi
    }

    ensure_ssh_rule

  watch-ssh.sh: |
    #!/bin/sh
    set -e

    # Use nsenter to run iptables on the host
    IPT="nsenter -t 1 -n -- iptables"

    RULE="-p tcp --dport 22 -j ACCEPT"

    while true; do
      if ! $IPT -C INPUT $RULE 2>/dev/null; then
        REJECT_LINE=$($IPT -L INPUT --line-numbers -n | grep -m1 'REJECT' | awk '{print $1}')
        if [ -n "$REJECT_LINE" ]; then
          $IPT -I INPUT "$REJECT_LINE" $RULE
          echo "$(date): Re-inserted SSH ACCEPT rule at line $REJECT_LINE"
        else
          $IPT -A INPUT $RULE
          echo "$(date): Re-appended SSH ACCEPT rule"
        fi
      fi
      sleep 30
    done

  fix-sshd-cloud-init.sh: |
    #!/bin/sh
    set -e

    CLOUD_INIT_SSHD="/host/etc/ssh/sshd_config.d/50-cloud-init.conf"
    CLOUD_INIT_CFG="/host/etc/cloud/cloud.cfg.d/99-disable-sshd-override.cfg"

    # Fix existing cloud-init sshd config if it forces PasswordAuthentication
    if [ -f "$CLOUD_INIT_SSHD" ]; then
      if grep -q "^PasswordAuthentication" "$CLOUD_INIT_SSHD"; then
        # Comment out the PasswordAuthentication line so the main sshd_config controls it
        sed -i 's/^PasswordAuthentication/#PasswordAuthentication/' "$CLOUD_INIT_SSHD"
        echo "$(date): Commented out PasswordAuthentication in 50-cloud-init.conf"
      fi
    fi

    # Prevent cloud-init from managing sshd config on future runs
    mkdir -p "$(dirname "$CLOUD_INIT_CFG")"
    cat > "$CLOUD_INIT_CFG" <<'CLOUDINIT'
    # Prevent cloud-init from overriding sshd_config
    ssh_pwauth: null
    ssh_genkeytypes: []
    manage_etc_hosts: false
    CLOUDINIT
    echo "$(date): Ensured cloud-init sshd override is disabled"
