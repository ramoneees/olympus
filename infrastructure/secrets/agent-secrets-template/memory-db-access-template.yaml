# PostgreSQL Memory Access for External Tools (Obsidian, etc.)
# 
# This secret provides access to the mnemosyne database for external tools
# that want to store embeddings (e.g., Obsidian sync, custom scripts, etc.)
#
# TEMPLATE ONLY - Generate sealed secret or apply manually with real password

apiVersion: v1
kind: Secret
metadata:
  name: memory-db-access
  namespace: apps  # or wherever your external tool runs
  labels:
    app.kubernetes.io/part-of: olympus
    app.kubernetes.io/component: memory-access
    app.kubernetes.io/managed-by: manual
type: Opaque
stringData:
  # Connection details for mnemosyne database
  MEMORY_DB_HOST: postgresql.databases.svc.cluster.local
  MEMORY_DB_PORT: "5432"
  MEMORY_DB_NAME: mnemosyne
  MEMORY_DB_USER: mnemosyne
  # Get password: kubectl get secret postgresql-secret -n databases -o jsonpath='{.data.postgres-password}' | base64 -d
  MEMORY_DB_PASSWORD: GET_FROM_KUBERNETES_SECRET
  MEMORY_DB_SSL_MODE: disable  # Internal cluster traffic
  
  # Full DSN for tools that support it (replace GET_FROM_KUBERNETES_SECRET with actual password)
  MEMORY_DB_DSN: postgresql://mnemosyne:GET_FROM_KUBERNETES_SECRET@postgresql.databases.svc.cluster.local:5432/mnemosyne?sslmode=disable
  
  # Embedding model info
  EMBEDDING_MODEL: bge-m3
  EMBEDDING_DIMENSIONS: "1024"
  EMBEDDING_SERVICE_URL: http://litellm.olympus.svc.cluster.local:4000
  
  # Available namespaces for organization
  # Use /memory/obsidian for Obsidian notes
  # Use /memory/personal for personal data
  # Use /memory/projects for project data
  # Use /memory/knowledge for curated knowledge
---
