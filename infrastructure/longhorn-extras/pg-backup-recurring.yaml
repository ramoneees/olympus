# Longhorn RecurringJob — PostgreSQL volume snapshot to B2
# Volumes opt in with label: recurring-job.longhorn.io/pg-backup-recurring: enabled
#
# To label the PostgreSQL volume:
#   VOL=$(kubectl get pv -o jsonpath='{range .items[?(@.spec.claimRef.name=="data-postgresql-0")]}{.spec.csi.volumeHandle}{end}')
#   kubectl -n longhorn-system label volume/$VOL recurring-job.longhorn.io/pg-backup-recurring=enabled
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: pg-backup-recurring
  namespace: longhorn-system
spec:
  name: pg-backup-recurring
  task: backup
  cron: "0 5 * * *"
  retain: 7
  concurrency: 1
  labels:
    app: postgresql
    backup-tier: layer2
