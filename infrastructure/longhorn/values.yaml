# Longhorn Helm values
# Chart: longhorn
# Repo: https://charts.longhorn.io
# Managed by ArgoCD after bootstrap

defaultSettings:
  # 1 replica — 2-node cluster has insufficient storage for 2 replicas
  defaultReplicaCount: 1
  # Default storage class
  defaultDataPath: /var/lib/longhorn
  # Backup target — Backblaze B2 via S3-compatible API
  # Replace REGION with your B2 bucket region (e.g., us-west-004)
  backupTarget: "s3://olympus-longhorn-backups@s3.REGION.backblazeb2.com/"
  backupTargetCredentialSecret: longhorn-b2-credentials
  # Guaranteed engine manager CPU
  guaranteedInstanceManagerCPU: 12
  # Storage over-provisioning — allow 200% for 2-node homelab
  storageOverProvisioningPercentage: 200
  storageMinimalAvailablePercentage: 10

persistence:
  defaultClass: true
  defaultFsType: ext4
  defaultClassReplicaCount: 1
  reclaimPolicy: Retain

ingress:
  enabled: false  # We use Traefik IngressRoute instead

longhornUI:
  replicas: 1

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
