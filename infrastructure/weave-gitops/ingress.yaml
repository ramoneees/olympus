apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: weave-gitops
  namespace: infrastructure
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`flux.ramoneees.com`)
      kind: Rule
      services:
        - name: weave-gitops
          port: 9001
  tls:
    secretName: wildcard-ramoneees-com-tls
