# Open WebUI — Chat frontend for LLMs (connects to LiteLLM)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: olympus
  labels:
    app: openwebui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OPENAI_API_BASE_URL
              value: "http://litellm.olympus.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secret
                  key: litellm-api-key
            - name: OLLAMA_BASE_URL
              value: ""
            - name: WEBUI_AUTH
              value: "true"
            - name: WEBUI_NAME
              value: "OLYMPUS"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: olympus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: openwebui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
