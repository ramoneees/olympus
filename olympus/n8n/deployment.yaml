# n8n — Workflow automation hub
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: olympus
  labels:
    app: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: install-qpdf
          image: debian:bookworm-slim
          command:
            - sh
            - -c
            - |
              apt-get update && apt-get install -y --no-install-recommends qpdf
              cp /usr/bin/qpdf /tools/
              # Copy only qpdf-specific libs (NOT core system libs like libc, libstdc++, ld-linux)
              cp /usr/lib/x86_64-linux-gnu/libqpdf*.so* /tools/ 2>/dev/null || true
              cp /usr/lib/x86_64-linux-gnu/libjpeg*.so* /tools/ 2>/dev/null || true
              apt-get clean && rm -rf /var/lib/apt/lists/*
          volumeMounts:
            - name: tools
              mountPath: /tools
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          ports:
            - name: http
              containerPort: 5678
          env:
            - name: PATH
              value: "/opt/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: LD_LIBRARY_PATH
              value: "/opt/tools"
            - name: N8N_HOST
              value: "n8n.ramoneees.com"
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_PORT
              value: "5678"
            - name: WEBHOOK_URL
              value: "https://n8n.ramoneees.com/"
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_HOST
              value: "postgresql.databases.svc.cluster.local"
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_USER
              value: "n8n"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-secret
                  key: db-password
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secret
                  key: encryption-key
            - name: N8N_MCP_SERVER_ENABLED
              value: "true"
            - name: NODES_EXCLUDE
              value: "[]"
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
            - name: tools
              mountPath: /opt/tools
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: tools
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: olympus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: n8n
  ports:
    - name: http
      port: 5678
      targetPort: 5678
