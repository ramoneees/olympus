# LiteLLM Proxy — Unified LLM gateway (Ollama + cloud APIs)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: olympus
  labels:
    app: litellm
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      nodeSelector:
        kubernetes.io/hostname: olympus
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-v1.83.3.rc.1
          imagePullPolicy: Always
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: SETUP_MODE
              value: "True"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: database-url
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: master-key
            - name: GLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: glm-api-key
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: dashscope-api-key
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: openrouter-api-key
            - name: MINIMAX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: minimax-api-key
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: olympus
data:
  config.yaml: |
    model_list:
      # Local Ollama models (only models actually pulled)
      - model_name: bge-m3
        litellm_params:
          model: ollama/bge-m3:latest
          api_base: http://ollama.olympus.svc.cluster.local:11434
        model_info:
          max_input_tokens: 8192
          max_tokens: 1
          mode: embedding
      - model_name: gpt-oss:20b
        litellm_params:
          model: ollama/gpt-oss:20b
          api_base: http://ollama.olympus.svc.cluster.local:11434
        model_info:
          max_input_tokens: 128000
          max_tokens: 32768
      - model_name: gemma4:e2b
        litellm_params:
          model: ollama/gemma4:e2b
          api_base: http://ollama.olympus.svc.cluster.local:11434
        model_info:
          max_input_tokens: 128000
          max_tokens: 8192
          supports_vision: true
      - model_name: gemma4:e4b
        litellm_params:
          model: ollama/gemma4:e4b
          api_base: http://ollama.olympus.svc.cluster.local:11434
        model_info:
          max_input_tokens: 128000
          max_tokens: 8192
          supports_vision: true
      # Cloud — ZAI (ZhipuAI) Coding Plan
      - model_name: glm-5
        litellm_params:
          model: openai/glm-5
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/GLM_API_KEY
        model_info:
          max_input_tokens: 202752
          max_tokens: 131072
      - model_name: glm-5-turbo
        litellm_params:
          model: openai/glm-5-turbo
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/GLM_API_KEY
        model_info:
          max_input_tokens: 202752
          max_tokens: 131072
      # glm-5-code removed — does not exist as a separate model; glm-5-turbo is the code-optimized variant
      - model_name: glm-5.1
        litellm_params:
          model: openai/glm-5.1
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/GLM_API_KEY
        model_info:
          max_input_tokens: 202752
          max_tokens: 131072
      - model_name: glm-4.7
        litellm_params:
          model: openai/glm-4.7
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/GLM_API_KEY
        model_info:
          max_input_tokens: 202752
          max_tokens: 131072
      - model_name: glm-4.6
        litellm_params:
          model: openai/glm-4.6
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/GLM_API_KEY
        model_info:
          max_input_tokens: 202752
          max_tokens: 131072
      # Alibaba Cloud — DashScope Coding Plan (all models via coding endpoint)
      - model_name: qwen3.5-plus
        litellm_params:
          model: openai/qwen3.5-plus
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
        model_info:
          max_input_tokens: 1000000
          max_tokens: 65536
          supports_vision: true
      - model_name: qwen3-coder-plus
        litellm_params:
          model: openai/qwen3-coder-plus
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
        model_info:
          max_input_tokens: 1000000
          max_tokens: 65536
      - model_name: qwen3-coder-next
        litellm_params:
          model: openai/qwen3-coder-next
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
        model_info:
          max_input_tokens: 262144
          max_tokens: 65536
      # MiniMax — direct Anthropic-compatible API
      - model_name: MiniMax-M2.5
        litellm_params:
          model: anthropic/MiniMax-M2.5
          api_base: https://api.minimax.io/anthropic
          api_key: os.environ/MINIMAX_API_KEY
        model_info:
          max_input_tokens: 196608
          max_tokens: 16384
      - model_name: MiniMax-M2.7
        litellm_params:
          model: anthropic/MiniMax-M2.7
          api_base: https://api.minimax.io/anthropic
          api_key: os.environ/MINIMAX_API_KEY
        model_info:
          max_input_tokens: 196608
          max_tokens: 16384
      - model_name: MiniMax-VL-01
        litellm_params:
          model: anthropic/MiniMax-VL-01
          api_base: https://api.minimax.io/anthropic
          api_key: os.environ/MINIMAX_API_KEY
        model_info:
          max_input_tokens: 196608
          max_tokens: 16384
          supports_vision: true
      - model_name: kimi-k2.5
        litellm_params:
          model: openai/kimi-k2.5
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
        model_info:
          max_input_tokens: 262144
          max_tokens: 98304
          supports_vision: true
      - model_name: glm-5-dashscope
        litellm_params:
          model: openai/glm-5
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
        model_info:
          max_input_tokens: 202752
          max_tokens: 131072
      - model_name: glm-4.7-dashscope
        litellm_params:
          model: openai/glm-4.7
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
        model_info:
          max_input_tokens: 202752
          max_tokens: 131072
      # OpenRouter (access to many models)
      - model_name: openrouter/deepseek-v4-flash
        litellm_params:
          model: openrouter/deepseek/deepseek-v4-flash
          api_key: os.environ/OPENROUTER_API_KEY
        model_info:
          max_input_tokens: 1048576
          max_tokens: 1048576        
      - model_name: openrouter/deepseek-v4-pro
        litellm_params:
          model: openrouter/deepseek/deepseek-v4-pro
          api_key: os.environ/OPENROUTER_API_KEY
        model_info:
          max_input_tokens: 1048576
          max_tokens: 1048576            
    router_settings:
      routing_strategy: latency-based-routing
      redis_host: redis-master.databases.svc.cluster.local
      redis_port: 6379
    litellm_settings:
      drop_params: true
      set_verbose: false
      cache: true
      cache_params:
        type: redis
        host: redis-master.databases.svc.cluster.local
        port: 6379
      request_timeout: 60
      timeout: 120
    general_settings:
      database_url: os.environ/DATABASE_URL
      master_key: os.environ/LITELLM_MASTER_KEY
      store_model_in_db: false
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
