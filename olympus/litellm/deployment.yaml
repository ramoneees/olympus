# LiteLLM Proxy — Unified LLM gateway (Ollama + cloud APIs)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: olympus
  labels:
    app: litellm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: database-url
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: master-key
            - name: GLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: glm-api-key
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: dashscope-api-key
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: openrouter-api-key
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: olympus
data:
  config.yaml: |
    model_list:
      # Local Ollama models
      - model_name: qwen2.5-coder:7b
        litellm_params:
          model: ollama/qwen2.5-coder:7b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: deepseek-r1:7b
        litellm_params:
          model: ollama/deepseek-r1:7b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: qwen3:8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: qwen3.5:9b
        litellm_params:
          model: ollama/qwen3.5:9b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: nomic-embed-text-v2
        litellm_params:
          model: ollama/nomic-embed-text-v2
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: qwen3-vl:8b
        litellm_params:
          model: ollama/qwen3-vl:8b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      # Cloud fallback
      - model_name: glm-5-turbo
        litellm_params:
          model: openai/glm-5-turbo
          api_base: https://open.bigmodel.cn/api/paas/v4
          api_key: os.environ/GLM_API_KEY
      # Alibaba Cloud (DashScope)
      - model_name: qwen-plus
        litellm_params:
          model: openai/qwen-plus
          api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: qwen-turbo
        litellm_params:
          model: openai/qwen-turbo
          api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: qwen-max
        litellm_params:
          model: openai/qwen-max
          api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: qwen3-coder-plus
        litellm_params:
          model: openai/qwen3-coder-plus
          api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: MiniMax-M2.5
        litellm_params:
          model: openai/MiniMax-M2.5
          api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      # OpenRouter (access to many models)
      - model_name: openrouter/auto
        litellm_params:
          model: openrouter/auto
          api_key: os.environ/OPENROUTER_API_KEY
      - model_name: openrouter/google/gemini-2.5-flash
        litellm_params:
          model: openrouter/google/gemini-2.5-flash
          api_key: os.environ/OPENROUTER_API_KEY
      - model_name: openrouter/deepseek/deepseek-r1
        litellm_params:
          model: openrouter/deepseek/deepseek-r1
          api_key: os.environ/OPENROUTER_API_KEY
      - model_name: openrouter/anthropic/claude-sonnet-4
        litellm_params:
          model: openrouter/anthropic/claude-sonnet-4
          api_key: os.environ/OPENROUTER_API_KEY
    router_settings:
      routing_strategy: simple-shuffle
    litellm_settings:
      drop_params: true
      set_verbose: false
    general_settings:
      database_url: os.environ/DATABASE_URL
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
