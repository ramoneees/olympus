# LiteLLM Proxy — Unified LLM gateway (Ollama + cloud APIs)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: olympus
  labels:
    app: litellm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      nodeSelector:
        kubernetes.io/hostname: olympus
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          imagePullPolicy: Always
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: database-url
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: master-key
            - name: GLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: glm-api-key
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: dashscope-api-key
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: openrouter-api-key
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: olympus
data:
  config.yaml: |
    model_list:
      # Local Ollama models
      - model_name: qwen2.5-coder:7b
        litellm_params:
          model: ollama/qwen2.5-coder:7b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: deepseek-r1:7b
        litellm_params:
          model: ollama/deepseek-r1:7b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: qwen3:8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: qwen3.5:9b
        litellm_params:
          model: ollama/qwen3.5:9b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: bge-m3
        litellm_params:
          model: ollama/bge-m3
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: qwen3-vl:8b
        litellm_params:
          model: ollama/qwen3-vl:8b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: gpt-oss:20b
        litellm_params:
          model: ollama/gpt-oss:20b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: gemma4:e2b
        litellm_params:
          model: ollama/gemma4:e2b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: gemma4:e4b
        litellm_params:
          model: ollama/gemma4:e4b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: qwen3.5:0.8b
        litellm_params:
          model: ollama/qwen3.5:0.8b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: qwen3.5:2b
        litellm_params:
          model: ollama/qwen3.5:2b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      - model_name: qwen3.5:4b
        litellm_params:
          model: ollama/qwen3.5:4b
          api_base: http://ollama.olympus.svc.cluster.local:11434
      # Cloud — ZAI (ZhipuAI) direct API
      - model_name: glm-5
        litellm_params:
          model: zai/glm-5
          api_key: os.environ/GLM_API_KEY
      - model_name: glm-5-turbo
        litellm_params:
          model: openai/glm-5-turbo
          api_base: https://api.z.ai/api/paas/v4
          api_key: os.environ/GLM_API_KEY
      - model_name: glm-5-code
        litellm_params:
          model: zai/glm-5-code
          api_key: os.environ/GLM_API_KEY
      - model_name: glm-4.7
        litellm_params:
          model: zai/glm-4.7
          api_key: os.environ/GLM_API_KEY
      - model_name: glm-4.6
        litellm_params:
          model: zai/glm-4.6
          api_key: os.environ/GLM_API_KEY
      # Alibaba Cloud — DashScope Coding Plan (all models via coding endpoint)
      - model_name: qwen3.5-plus
        litellm_params:
          model: openai/qwen3.5-plus
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: qwen3-coder-plus
        litellm_params:
          model: openai/qwen3-coder-plus
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: qwen3-coder-next
        litellm_params:
          model: openai/qwen3-coder-next
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: MiniMax-M2.5
        litellm_params:
          model: openai/MiniMax-M2.5
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: kimi-k2.5
        litellm_params:
          model: openai/kimi-k2.5
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: glm-5-dashscope
        litellm_params:
          model: openai/glm-5
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      - model_name: glm-4.7-dashscope
        litellm_params:
          model: openai/glm-4.7
          api_base: https://coding-intl.dashscope.aliyuncs.com/v1
          api_key: os.environ/DASHSCOPE_API_KEY
      # OpenRouter (access to many models)
      - model_name: openrouter/minimax/minimax-m2.7
        litellm_params:
          model: openrouter/minimax/minimax-m2.7
          api_key: os.environ/OPENROUTER_API_KEY    
    router_settings:
      routing_strategy: simple-shuffle
    litellm_settings:
      drop_params: true
      set_verbose: false
    general_settings:
      database_url: os.environ/DATABASE_URL
      master_key: os.environ/LITELLM_MASTER_KEY
      store_model_in_db: false
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: olympus
spec:
  type: NodePort
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 30400
