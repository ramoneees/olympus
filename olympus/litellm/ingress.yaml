---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: litellm
  namespace: olympus
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`litellm.ramoneees.com`)
      kind: Rule
      services:
        - name: litellm
          port: 4000
  tls:
    secretName: wildcard-ramoneees-com-tls
