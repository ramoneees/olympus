# Mission Control — builderz-labs/mission-control
# Open-source AI agent orchestration dashboard
---
apiVersion: v1
kind: Secret
metadata:
  name: mission-control-secret
  namespace: olympus
type: Opaque
stringData:
  admin-password: "CHANGE_ME"
  auth-secret: "CHANGE_ME"
  gateway-token: "CHANGE_ME"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mission-control-data
  namespace: olympus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control
  namespace: olympus
  labels:
    app: mission-control
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mission-control
  template:
    metadata:
      labels:
        app: mission-control
    spec:
      nodeSelector:
        kubernetes.io/hostname: olympus
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ['sh', '-c', 'chown -R 1001:1001 /data']
          volumeMounts:
            - name: mc-data
              mountPath: /data
      containers:
        - name: mission-control
          image: git.ramoneees.com/ramoneees/mission-control/mission-control:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # Auth — visit /setup on first run or set AUTH_USER/AUTH_PASS
            - name: AUTH_USER
              value: "admin"
            - name: AUTH_PASS
              valueFrom:
                secretKeyRef:
                  name: mission-control-secret
                  key: admin-password
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: mission-control-secret
                  key: auth-secret
            # OpenClaw gateway — server-side (MC backend → gateway)
            - name: OPENCLAW_GATEWAY_HOST
              value: "192.168.50.11"
            - name: OPENCLAW_GATEWAY_PORT
              value: "18789"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mission-control-secret
                  key: gateway-token
            # OpenClaw gateway — browser-side (auto-detect from browser)
            - name: NEXT_PUBLIC_GATEWAY_OPTIONAL
              value: "true"
            - name: NEXT_PUBLIC_GATEWAY_URL
              value: "wss://openclaw.ramoneees.com"
            # Network access
            - name: MC_ALLOWED_HOSTS
              value: "mission-control.ramoneees.com,localhost,127.0.0.1"
            # Data directory (persistent volume)
            - name: MISSION_CONTROL_DATA_DIR
              value: "/data"
          volumeMounts:
            - name: mc-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: mc-data
          persistentVolumeClaim:
            claimName: mission-control-data
---
apiVersion: v1
kind: Service
metadata:
  name: mission-control
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: mission-control
  ports:
    - name: http
      port: 80
      targetPort: 3000
