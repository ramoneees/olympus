# Mission Control — builderz-labs/mission-control
# Open-source AI agent orchestration dashboard
# Secret is in secrets.yaml (applied manually, not tracked in git)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mission-control-data
  namespace: olympus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control
  namespace: olympus
  labels:
    app: mission-control
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mission-control
  template:
    metadata:
      labels:
        app: mission-control
    spec:
      nodeSelector:
        kubernetes.io/hostname: olympus
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ['sh', '-c', 'chown -R 1001:1001 /data']
          volumeMounts:
            - name: mc-data
              mountPath: /data
        - name: copy-openclaw-config
          image: busybox
          command:
            - sh
            - -c
            - |
              cp -a /src/openclaw.json /src/workspaces /src/agents /src/config /src/CLAUDE.md /src/memory /dest/ 2>/dev/null || true
              mkdir -p /dest/workspace 2>/dev/null || true
              sed -i 's|/home/ramoneees/.openclaw|/openclaw|g' /dest/openclaw.json 2>/dev/null || true
              chown -R 1001:1001 /dest/
          volumeMounts:
            - name: openclaw-data-host
              mountPath: /src
              readOnly: true
            - name: openclaw-config
              mountPath: /dest
      containers:
        - name: mission-control
          image: git.ramoneees.com/ramoneees/mission-control/mission-control:latest
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: openclaw-config
              mountPath: /openclaw
              readOnly: true
            - name: mc-data
              mountPath: /data
            - name: openclaw-cli
              mountPath: /openclaw-cli
              readOnly: true
          env:
            - name: OPENCLAW_BIN
              value: "/openclaw-cli/bin/openclaw"
            - name: NODE_PATH
              value: "/openclaw-cli/lib/node_modules"
            # OpenClaw CLI gateway connection (for task dispatch)
            - name: OPENCLAW_ALLOW_INSECURE_PRIVATE_WS
              value: "1"
            - name: OPENCLAW_GATEWAY_URL
              value: "ws://192.168.50.11:18789"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mission-control-secret
                  key: gateway-token
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # Auth — visit /setup on first run or set AUTH_USER/AUTH_PASS
            - name: AUTH_USER
              value: "admin"
            - name: AUTH_PASS
              valueFrom:
                secretKeyRef:
                  name: mission-control-secret
                  key: admin-password
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: mission-control-secret
                  key: auth-secret
            # API key for MCP server + REST API auth
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: mission-control-secret
                  key: api-key
            # OpenClaw gateway — server-side (MC backend → gateway)
            - name: OPENCLAW_GATEWAY_HOST
              value: "192.168.50.11"
            - name: OPENCLAW_GATEWAY_PORT
              value: "18789"
            # OpenClaw gateway — browser-side (auto-detect from browser)
            - name: NEXT_PUBLIC_GATEWAY_OPTIONAL
              value: "true"
            - name: NEXT_PUBLIC_GATEWAY_URL
              value: "wss://openclaw.ramoneees.com"
            # OpenClaw data (read-only) for file browsing, memory, skills, config
            - name: OPENCLAW_HOME
              value: "/openclaw"
            - name: OPENCLAW_STATE_DIR
              value: "/openclaw"
            - name: OPENCLAW_CONFIG_PATH
              value: "/openclaw/openclaw.json"
            - name: OPENCLAW_WORKSPACE_DIR
              value: "/openclaw/workspaces"
            - name: OPENCLAW_MEMORY_DIR
              value: "/openclaw/memory"
            # Network access
            - name: MC_ALLOWED_HOSTS
              value: "mission-control.ramoneees.com,localhost,127.0.0.1"
            # Data directory (persistent volume)
            - name: MISSION_CONTROL_DATA_DIR
              value: "/data"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 4Gi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: openclaw-data-host
          hostPath:
            path: /home/ramoneees/.openclaw
            type: Directory
        - name: openclaw-config
          emptyDir: {}
        - name: openclaw-cli
          hostPath:
            path: /home/ramoneees/.npm-global
            type: Directory
        - name: mc-data
          persistentVolumeClaim:
            claimName: mission-control-data
---
apiVersion: v1
kind: Service
metadata:
  name: mission-control
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: mission-control
  ports:
    - name: http
      port: 80
      targetPort: 3000
