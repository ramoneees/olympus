# OpenClaw — Multi-agent AI orchestration gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: olympus
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-openclaw
          image: busybox:1.36
          env:
            - name: N8N_MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: N8N_MCP_TOKEN
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: POSTGRES_URL
            - name: Z_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: Z_AI_API_KEY
            - name: TICKTICK_OAUTH_TOKENS
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: TICKTICK_OAUTH_TOKENS
            - name: GOOGLE_OAUTH_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GOOGLE_OAUTH_CREDENTIALS
                  optional: true
            - name: GOOGLE_CALENDAR_TOKENS
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GOOGLE_CALENDAR_TOKENS
                  optional: true
          command:
            - sh
            - -c
            - |
              # The entire ~/.openclaw is the PVC — create all needed dirs
              mkdir -p /openclaw/config /openclaw/data/extensions \
                       /openclaw/canvas /openclaw/cron /openclaw/devices \
                       /openclaw/identity /openclaw/agents /openclaw/credentials \
                       /openclaw/homebrew/Homebrew /openclaw/homebrew/bin \
                       /openclaw/homebrew/sbin /openclaw/homebrew/Cellar \
                       /openclaw/homebrew/etc /openclaw/homebrew/include \
                       /openclaw/homebrew/lib /openclaw/homebrew/opt \
                       /openclaw/homebrew/share /openclaw/homebrew/var \
                       /openclaw/npm-global
              # Copy root config (overwrite each start so git changes propagate)
              cp -f /src/root-config/openclaw.json5 /openclaw/openclaw.json5
              # Copy config files from ConfigMap
              cp -f /src/config-files/* /openclaw/config/ 2>/dev/null || true
              # Generate mcporter config with expanded secrets
              cat > /app-config/mcporter.json << 'MCPEOF'
              {
                "mcpServers": {
                
                  "n8n": {
                    "transport": "streamable-http",
                    "baseUrl": "http://n8n.olympus.svc.cluster.local:5678/mcp-server/http",
                    "headers": {
                      "Authorization": "Bearer PLACEHOLDER_N8N_TOKEN"
                    }
                  },
                  "sequential-thinking": {
                    "command": "npx",
                    "args": ["-y", "@modelcontextprotocol/server-sequential-thinking"]
                  },
                  "kubernetes": {
                    "command": "npx",
                    "args": ["-y", "kubernetes-mcp-server@latest", "--disable-destructive"]
                  },
                  "filesystem": {
                    "command": "npx",
                    "args": ["-y", "@modelcontextprotocol/server-filesystem", "/home/node/.openclaw/workspaces"]
                  },
                  "postgres": {
                    "command": "npx",
                    "args": ["-y", "@modelcontextprotocol/server-postgres", "PLACEHOLDER_POSTGRES_URL"]
                  },
                  "ticktick": {
                    "description": "TickTick task management (official MCP)",
                    "url": "https://mcp.ticktick.com",
                    "transport": "streamable-http",
                    "auth": "oauth",
                    "tokenCacheDir": "/home/node/.openclaw/credentials/ticktick"
                  },
                  "web-search-prime": {
                    "transport": "streamable-http",
                    "url": "https://api.z.ai/api/mcp/web_search_prime/mcp",
                    "headers": {
                      "Authorization": "Bearer PLACEHOLDER_ZAI_KEY"
                    }
                  },
                  "web-reader": {
                    "transport": "streamable-http",
                    "url": "https://api.z.ai/api/mcp/web_reader/mcp",
                    "headers": {
                      "Authorization": "Bearer PLACEHOLDER_ZAI_KEY"
                    }   
                  },
                  "zreader": {
                    "transport": "streamable-http",
                    "url": "https://api.z.ai/api/mcp/zread/mcp",
                    "headers": {
                      "Authorization": "Bearer PLACEHOLDER_ZAI_KEY"
                    }
                  },
                  "google-calendar": {
                    "command": "npx",
                    "args": ["-y", "@cocal/google-calendar-mcp"],
                    "env": {
                      "GOOGLE_OAUTH_CREDENTIALS": "/home/node/.openclaw/credentials/google-calendar/gcp-oauth.keys.json",
                      "GOOGLE_CALENDAR_MCP_TOKEN_PATH": "/home/node/.openclaw/credentials/google-calendar/.tokens.json"
                    }
                  }
                },
                "imports": []
              }
              MCPEOF
              # Expand secrets in mcporter config
              sed -i "s|PLACEHOLDER_N8N_TOKEN|${N8N_MCP_TOKEN}|g" /app-config/mcporter.json
              sed -i "s|PLACEHOLDER_POSTGRES_URL|${POSTGRES_URL}|g" /app-config/mcporter.json
              sed -i "s|PLACEHOLDER_ZAI_KEY|${Z_AI_API_KEY}|g" /app-config/mcporter.json
              # Seed TickTick OAuth credentials from secret (one-time auth obtained locally via mcporter).
              # These files persist on the PVC; mcporter auto-refreshes tokens on expiry — no re-login needed.
              # How to obtain (run once on your local machine):
              #   mcporter auth ticktick      # opens browser → log in to TickTick → authorize
              #   cat ~/.mcporter/credentials.json   # grab the ticktick entry
              # Store the full JSON entry as the TICKTICK_OAUTH_TOKENS secret value.
              # mcporter expects 4 files in tokenCacheDir: client.json, tokens.json, state.txt, code_verifier.txt
              if [ -n "${TICKTICK_OAUTH_TOKENS}" ] && [ "${TICKTICK_OAUTH_TOKENS}" != "PLACEHOLDER" ]; then
                mkdir -p /openclaw/credentials/ticktick
                # Only seed if tokens.json does NOT already exist on the PVC.
                # mcporter refreshes tokens at runtime and writes back to these files —
                # overwriting on every restart would clobber the refreshed tokens and break auth.
                if [ ! -f /openclaw/credentials/ticktick/tokens.json ]; then
                  # Extract sub-objects from the full credentials JSON using busybox-compatible parsing
                  echo "${TICKTICK_OAUTH_TOKENS}" | sed -n 's/.*"clientInfo":\({[^}]*}\).*/\1/p' > /openclaw/credentials/ticktick/client.json
                  echo "${TICKTICK_OAUTH_TOKENS}" | sed -n 's/.*"tokens":\({[^}]*}\).*/\1/p' > /openclaw/credentials/ticktick/tokens.json
                  echo "${TICKTICK_OAUTH_TOKENS}" | sed -n 's/.*"state":"\([^"]*\)".*/"\1"/p' > /openclaw/credentials/ticktick/state.txt
                  echo "${TICKTICK_OAUTH_TOKENS}" | sed -n 's/.*"codeVerifier":"\([^"]*\)".*/\1/p' > /openclaw/credentials/ticktick/code_verifier.txt
                  echo "TickTick OAuth credentials seeded (first boot — 4 files)."
                else
                  echo "TickTick OAuth credentials already present on PVC — preserving."
                fi
              fi
              # Seed Google Calendar OAuth credentials and tokens
              mkdir -p /openclaw/credentials/google-calendar
              if [ ! -f /openclaw/credentials/google-calendar/gcp-oauth.keys.json ]; then
                echo "${GOOGLE_OAUTH_CREDENTIALS}" > /openclaw/credentials/google-calendar/gcp-oauth.keys.json
                echo "Google OAuth credentials seeded."
              fi
              if [ -n "${GOOGLE_CALENDAR_TOKENS}" ] && [ "${GOOGLE_CALENDAR_TOKENS}" != "PLACEHOLDER" ]; then
                if [ ! -f /openclaw/credentials/google-calendar/.tokens.json ]; then
                  echo "${GOOGLE_CALENDAR_TOKENS}" > /openclaw/credentials/google-calendar/.tokens.json
                  echo "Google Calendar tokens seeded (first boot)."
                else
                  echo "Google Calendar tokens already present — preserving."
                fi
              fi
              # Sync workspace files from ConfigMaps
              for agent in hermes hephaestus athena plutus themis nemesis iris asclepius argus prometheus mnemosyne calliope persephone; do
                mkdir -p /openclaw/workspaces/$agent
                cp -f /src/ws/$agent/* /openclaw/workspaces/$agent/ 2>/dev/null || true
              done
              # Seed cron jobs (only if jobs.json does not exist yet — preserves runtime changes)
              if [ ! -f /openclaw/cron/jobs.json ]; then
                cat > /openclaw/cron/jobs.json << 'CRONEOF'
              [
                {
                  "id": "daily-briefing",
                  "name": "Daily Briefing",
                  "schedule": { "kind": "cron", "expr": "0 8 * * *", "tz": "Europe/Lisbon" },
                  "agentId": "hermes",
                  "sessionTarget": "session:briefing-daily",
                  "payload": {
                    "kind": "agentTurn",
                    "message": "Run the daily morning briefing per HEARTBEATS.md. Include: (1) all events from BOTH personal and work Google Calendars for today, (2) today's TickTick tasks and calendar items, (3) Bible verse of the day via Athena. Format per your HEARTBEATS.md daily template. Deliver via WhatsApp.",
                    "lightContext": true
                  },
                  "deleteAfterRun": false
                },
                {
                  "id": "weekly-briefing",
                  "name": "Weekly Briefing",
                  "schedule": { "kind": "cron", "expr": "0 20 * * 0", "tz": "Europe/Lisbon" },
                  "agentId": "hermes",
                  "sessionTarget": "session:briefing-weekly",
                  "payload": {
                    "kind": "agentTurn",
                    "message": "Run the weekly briefing per HEARTBEATS.md. Include: (1) all events from BOTH personal and work Google Calendars for this week (Monday through Sunday), (2) this week's TickTick tasks and calendar items. Format per your HEARTBEATS.md weekly template. Deliver via WhatsApp.",
                    "lightContext": true
                  },
                  "deleteAfterRun": false
                }
              ]
              CRONEOF
                echo "Cron jobs seeded (first boot)."
              else
                echo "Cron jobs already present on PVC — preserving."
              fi
          volumeMounts:
            - name: data
              mountPath: /openclaw
            - name: mcporter-config
              mountPath: /app-config
            - name: root-config
              mountPath: /src/root-config
              readOnly: true
            - name: config-files
              mountPath: /src/config-files
              readOnly: true
            - name: ws-hermes
              mountPath: /src/ws/hermes
              readOnly: true
            - name: ws-hephaestus
              mountPath: /src/ws/hephaestus
              readOnly: true
            - name: ws-athena
              mountPath: /src/ws/athena
              readOnly: true
            - name: ws-plutus
              mountPath: /src/ws/plutus
              readOnly: true
            - name: ws-themis
              mountPath: /src/ws/themis
              readOnly: true
            - name: ws-nemesis
              mountPath: /src/ws/nemesis
              readOnly: true
            - name: ws-iris
              mountPath: /src/ws/iris
              readOnly: true
            - name: ws-asclepius
              mountPath: /src/ws/asclepius
              readOnly: true
            - name: ws-argus
              mountPath: /src/ws/argus
              readOnly: true
            - name: ws-prometheus
              mountPath: /src/ws/prometheus
              readOnly: true
            - name: ws-mnemosyne
              mountPath: /src/ws/mnemosyne
              readOnly: true
            - name: ws-calliope
              mountPath: /src/ws/calliope
              readOnly: true
            - name: ws-persephone
              mountPath: /src/ws/persephone
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - name: http
              containerPort: 18789
          env:
            - name: NODE_ENV
              value: "production"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=3584"
            - name: HOMEBREW_PREFIX
              value: "/home/linuxbrew/.linuxbrew"
            - name: HOMEBREW_CELLAR
              value: "/home/linuxbrew/.linuxbrew/Cellar"
            - name: HOMEBREW_REPOSITORY
              value: "/home/linuxbrew/.linuxbrew/Homebrew"
            - name: NPM_CONFIG_PREFIX
              value: "/home/node/.openclaw/npm-global"
            - name: PATH
              value: "/home/node/.openclaw/npm-global/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: OPENCLAW_HOOKS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_HOOKS_TOKEN
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: LITELLM_API_KEY
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: BRAVE_API_KEY
            - name: MATTERMOST_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MATTERMOST_BOT_TOKEN
            - name: MATTERMOST_URL
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MATTERMOST_URL
            - name: N8N_MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: N8N_MCP_TOKEN
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: ELEVENLABS_API_KEY
                  optional: true
            # Google Calendar MCP — env vars for @cocal/google-calendar-mcp
            # These must be on the main container so mcporter's spawned npx process inherits them.
            - name: GOOGLE_OAUTH_CREDENTIALS
              value: "/home/node/.openclaw/credentials/google-calendar/gcp-oauth.keys.json"
            - name: GOOGLE_CALENDAR_MCP_TOKEN_PATH
              value: "/home/node/.openclaw/credentials/google-calendar/.tokens.json"
          volumeMounts:
            # Entire .openclaw directory is the PVC (fully writable)
            - name: data
              mountPath: /home/node/.openclaw
            # mcporter MCP server config (generated by init container)
            - name: mcporter-config
              mountPath: /app/config
            # Homebrew at standard Linuxbrew path so bottles work
            - name: data
              mountPath: /home/linuxbrew/.linuxbrew
              subPath: homebrew
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: root-config
          configMap:
            name: openclaw-root-config
        - name: config-files
          configMap:
            name: openclaw-config-files
        - name: ws-hermes
          configMap:
            name: openclaw-ws-hermes
        - name: ws-hephaestus
          configMap:
            name: openclaw-ws-hephaestus
        - name: ws-athena
          configMap:
            name: openclaw-ws-athena
        - name: ws-plutus
          configMap:
            name: openclaw-ws-plutus
        - name: ws-themis
          configMap:
            name: openclaw-ws-themis
        - name: ws-nemesis
          configMap:
            name: openclaw-ws-nemesis
        - name: ws-iris
          configMap:
            name: openclaw-ws-iris
        - name: ws-asclepius
          configMap:
            name: openclaw-ws-asclepius
        - name: ws-argus
          configMap:
            name: openclaw-ws-argus
        - name: ws-prometheus
          configMap:
            name: openclaw-ws-prometheus
        - name: ws-mnemosyne
          configMap:
            name: openclaw-ws-mnemosyne
        - name: ws-calliope
          configMap:
            name: openclaw-ws-calliope
        - name: ws-persephone
          configMap:
            name: openclaw-ws-persephone
        - name: mcporter-config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  namespace: olympus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: olympus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-k8s-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "namespaces", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-k8s-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-k8s-reader
subjects:
  - kind: ServiceAccount
    name: openclaw
    namespace: olympus
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - name: http
      port: 18789
      targetPort: 18789
