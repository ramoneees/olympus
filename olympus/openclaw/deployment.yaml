# OpenClaw — Multi-agent AI orchestration gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: olympus
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-openclaw
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # The entire ~/.openclaw is the PVC — create all needed dirs
              mkdir -p /openclaw/config /openclaw/data/extensions \
                       /openclaw/canvas /openclaw/cron /openclaw/devices \
                       /openclaw/identity /openclaw/agents /openclaw/credentials
              # Copy root config (overwrite each start so git changes propagate)
              cp -f /src/root-config/openclaw.json /openclaw/openclaw.json
              # Copy config files from ConfigMap
              cp -f /src/config-files/* /openclaw/config/ 2>/dev/null || true
              # Sync workspace files from ConfigMaps
              for agent in hermes hephaestus athena plutus themis prometheus mnemosyne; do
                mkdir -p /openclaw/workspaces/$agent
                cp -f /src/ws/$agent/* /openclaw/workspaces/$agent/ 2>/dev/null || true
              done
          volumeMounts:
            - name: data
              mountPath: /openclaw
            - name: root-config
              mountPath: /src/root-config
              readOnly: true
            - name: config-files
              mountPath: /src/config-files
              readOnly: true
            - name: ws-hermes
              mountPath: /src/ws/hermes
              readOnly: true
            - name: ws-hephaestus
              mountPath: /src/ws/hephaestus
              readOnly: true
            - name: ws-athena
              mountPath: /src/ws/athena
              readOnly: true
            - name: ws-plutus
              mountPath: /src/ws/plutus
              readOnly: true
            - name: ws-themis
              mountPath: /src/ws/themis
              readOnly: true
            - name: ws-prometheus
              mountPath: /src/ws/prometheus
              readOnly: true
            - name: ws-mnemosyne
              mountPath: /src/ws/mnemosyne
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - name: http
              containerPort: 18789
          env:
            - name: NODE_ENV
              value: "production"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=3584"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: OPENCLAW_HOOKS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_HOOKS_TOKEN
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: LITELLM_API_KEY
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: BRAVE_API_KEY
            - name: MATTERMOST_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MATTERMOST_BOT_TOKEN
            - name: MATTERMOST_URL
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MATTERMOST_URL
          volumeMounts:
            # Entire .openclaw directory is the PVC (fully writable)
            - name: data
              mountPath: /home/node/.openclaw
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: root-config
          configMap:
            name: openclaw-root-config
        - name: config-files
          configMap:
            name: openclaw-config-files
        - name: ws-hermes
          configMap:
            name: openclaw-ws-hermes
        - name: ws-hephaestus
          configMap:
            name: openclaw-ws-hephaestus
        - name: ws-athena
          configMap:
            name: openclaw-ws-athena
        - name: ws-plutus
          configMap:
            name: openclaw-ws-plutus
        - name: ws-themis
          configMap:
            name: openclaw-ws-themis
        - name: ws-prometheus
          configMap:
            name: openclaw-ws-prometheus
        - name: ws-mnemosyne
          configMap:
            name: openclaw-ws-mnemosyne
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  namespace: olympus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - name: http
      port: 18789
      targetPort: 18789
