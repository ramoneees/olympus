# OpenClaw — Multi-agent AI orchestration gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: olympus
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-workspaces
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Create writable directories on PVC
              mkdir -p /data/extensions /data/canvas /data/cron /data/devices /data/identity /data/agents /data/credentials
              # Sync workspace files from ConfigMaps into writable PVC dirs
              for agent in hermes hephaestus athena plutus themis prometheus mnemosyne; do
                mkdir -p /data/workspaces/$agent
                # Copy all files from the read-only ConfigMap mount, overwriting
                cp -f /ws-src/$agent/* /data/workspaces/$agent/ 2>/dev/null || true
              done
          volumeMounts:
            - name: data
              mountPath: /data
            - name: ws-hermes
              mountPath: /ws-src/hermes
              readOnly: true
            - name: ws-hephaestus
              mountPath: /ws-src/hephaestus
              readOnly: true
            - name: ws-athena
              mountPath: /ws-src/athena
              readOnly: true
            - name: ws-plutus
              mountPath: /ws-src/plutus
              readOnly: true
            - name: ws-themis
              mountPath: /ws-src/themis
              readOnly: true
            - name: ws-prometheus
              mountPath: /ws-src/prometheus
              readOnly: true
            - name: ws-mnemosyne
              mountPath: /ws-src/mnemosyne
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - name: http
              containerPort: 18789
          env:
            - name: NODE_ENV
              value: "production"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: OPENCLAW_HOOKS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_HOOKS_TOKEN
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: LITELLM_API_KEY
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: BRAVE_API_KEY
            - name: MATTERMOST_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MATTERMOST_BOT_TOKEN
            - name: MATTERMOST_URL
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MATTERMOST_URL
          volumeMounts:
            # Root config (read-only)
            - name: root-config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
              readOnly: true
            # Config directory (read-only)
            - name: config-files
              mountPath: /home/node/.openclaw/config
              readOnly: true
            # Agent workspaces (writable, from PVC — seeded by initContainer)
            - name: data
              mountPath: /home/node/.openclaw/workspaces
              subPath: workspaces
            # Runtime data (PVC)
            - name: data
              mountPath: /home/node/.openclaw/data
            - name: data
              mountPath: /home/node/.openclaw/canvas
              subPath: canvas
            - name: data
              mountPath: /home/node/.openclaw/cron
              subPath: cron
            - name: data
              mountPath: /home/node/.openclaw/devices
              subPath: devices
            - name: data
              mountPath: /home/node/.openclaw/identity
              subPath: identity
            - name: data
              mountPath: /home/node/.openclaw/agents
              subPath: agents
            - name: data
              mountPath: /home/node/.openclaw/credentials
              subPath: credentials
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: root-config
          configMap:
            name: openclaw-root-config
        - name: config-files
          configMap:
            name: openclaw-config-files
        - name: ws-hermes
          configMap:
            name: openclaw-ws-hermes
        - name: ws-hephaestus
          configMap:
            name: openclaw-ws-hephaestus
        - name: ws-athena
          configMap:
            name: openclaw-ws-athena
        - name: ws-plutus
          configMap:
            name: openclaw-ws-plutus
        - name: ws-themis
          configMap:
            name: openclaw-ws-themis
        - name: ws-prometheus
          configMap:
            name: openclaw-ws-prometheus
        - name: ws-mnemosyne
          configMap:
            name: openclaw-ws-mnemosyne
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  namespace: olympus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - name: http
      port: 18789
      targetPort: 18789
