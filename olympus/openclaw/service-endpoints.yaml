---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: olympus
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 18789
      targetPort: 18789
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: openclaw
  namespace: olympus
  labels:
    kubernetes.io/service-name: openclaw
addressType: IPv4
ports:
  - name: http
    port: 18789
    protocol: TCP
endpoints:
  - addresses:
      - 192.168.50.11
