# OpenClaw ConfigMaps — config files + agent workspaces
# These are mounted read-only into the OpenClaw container.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-root-config
  namespace: olympus
data:
  openclaw.json: |
    {
      "agents": {
        "defaults": { "$include": "./config/agents.defaults.json5" },
        "list": { "$include": "./config/agents.list.v1-full.json5" }
      },
      "bindings": { "$include": "./config/bindings.v1.json5" },
      "tools": { "$include": "./config/tools.global.json5" },
      "models": {
        "mode": "merge",
        "providers": { "$include": "./config/models.providers.json5" }
      },
      "plugins": { "$include": "./config/plugins.v1.json5" },
      "gateway": {
        "port": 18789,
        "mode": "local",
        "bind": "lan",
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        }
      },
      "hooks": {
        "enabled": true,
        "path": "/hooks",
        "token": "${OPENCLAW_HOOKS_TOKEN}",
        "defaultSessionKey": "hook:ingress",
        "allowedAgentIds": ["hermes", "hephaestus", "athena", "plutus", "themis", "prometheus", "mnemosyne"],
        "internal": {
          "enabled": true,
          "entries": {
            "boot-md": { "enabled": true },
            "command-logger": { "enabled": true },
            "session-memory": { "enabled": true }
          }
        }
      },
      "channels": {
        "whatsapp": {
          "dmPolicy": "allowlist",
          "allowFrom": ["+351926565596"],
          "selfChatMode": true,
          "sendReadReceipts": true,
          "ackReaction": {
            "emoji": "👀",
            "direct": true,
            "group": "mentions"
          }
        },
        "mattermost": {
          "enabled": true,
          "botToken": "${MATTERMOST_BOT_TOKEN}",
          "baseUrl": "${MATTERMOST_URL}",
          "dmPolicy": "pairing",
          "chatmode": "oncall"
        }
      },
      "web": { "enabled": true },
      "memory": { "backend": "builtin" },
      "commands": { "native": "auto" },
      "cron": { "enabled": true }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config-files
  namespace: olympus
data:
  agents.defaults.json5: |
    {
      userTimezone: "Europe/Lisbon",
      timeFormat: "24",
      skipBootstrap: false,
      bootstrapMaxChars: 20000,
      bootstrapTotalMaxChars: 150000,
      imageMaxDimensionPx: 1200,
      models: {
        "litellm/MiniMax-M2.5": { alias: "fast-route", params: { temperature: 0.1 } },
        "litellm/qwen3-coder-plus": { alias: "smart-coder", params: { temperature: 0.2 } },
        "litellm/qwen3.5:9b": { alias: "fast-general", params: { temperature: 0.2 } },
        "litellm/deepseek-r1:7b": { alias: "local-reasoning" },
        "litellm/qwen3:8b": { alias: "local-general" },
        "litellm/qwen3-vl:8b": { alias: "vision" },
        "litellm/glm-5-turbo": { alias: "smart-glm" },
        "litellm/qwen-plus": { alias: "smart-qwen" },
        "litellm/qwen-max": { alias: "smart-qwen-max" },
        "litellm/openrouter/deepseek/deepseek-r1": { alias: "smart-deepseek" },
        "litellm/openrouter/google/gemini-2.5-flash": { alias: "smart-gemini" },
        "litellm/openrouter/anthropic/claude-sonnet-4": { alias: "premium-sonnet" },
      },
      model: {
        primary: "litellm/MiniMax-M2.5",
        fallbacks: [
          "litellm/qwen-plus",
          "litellm/openrouter/deepseek/deepseek-r1",
          "litellm/openrouter/anthropic/claude-sonnet-4",
        ],
      },
      maxConcurrent: 2,
      timeoutSeconds: 900,
      thinkingDefault: "low",
      verboseDefault: "off",
      elevatedDefault: "off",
      sandbox: { mode: "off" },
      subagents: {
        model: "litellm/MiniMax-M2.5",
        maxConcurrent: 2,
        runTimeoutSeconds: 900,
        archiveAfterMinutes: 60,
        maxSpawnDepth: 2,
        maxChildrenPerAgent: 4,
      },
      memorySearch: {
        enabled: true,
        provider: "openai",
        remote: {
          baseUrl: "http://litellm.olympus.svc.cluster.local:4000/v1/",
          apiKey: "${LITELLM_API_KEY}",
        },
        model: "nomic-embed-text-v2",
        fallback: "none",
        sync: { watch: true },
        query: {
          hybrid: {
            enabled: true,
            vectorWeight: 0.7,
            textWeight: 0.3,
            candidateMultiplier: 4,
            mmr: { enabled: true, lambda: 0.7 },
            temporalDecay: { enabled: true, halfLifeDays: 30 },
          },
        },
      },
    }
  agents.list.v1-full.json5: |
    [
      {
        id: "hermes", default: true,
        workspace: "/home/node/.openclaw/workspaces/hermes",
        model: "litellm/MiniMax-M2.5",
        sandbox: { mode: "off" },
        subagents: { allowAgents: ["hephaestus", "athena", "plutus", "themis", "prometheus", "mnemosyne"] },
        tools: {
          profile: "minimal",
          allow: ["read", "memory_search", "memory_get", "sessions_list", "sessions_history", "sessions_spawn", "session_status"],
          deny: ["write", "edit", "apply_patch", "exec", "process", "browser", "canvas", "web_search", "web_fetch", "cron", "gateway", "message", "image"],
          loopDetection: { enabled: true },
        },
      },
      {
        id: "hephaestus",
        workspace: "/home/node/.openclaw/workspaces/hephaestus",
        model: "litellm/qwen3-coder-plus",
        sandbox: { mode: "off" },
        tools: {
          profile: "minimal",
          allow: ["group:fs", "group:runtime", "group:memory", "web_search", "web_fetch", "session_status"],
          deny: ["sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "browser", "canvas", "cron", "gateway", "message"],
          elevated: { enabled: false },
          loopDetection: { enabled: true },
        },
      },
      {
        id: "athena",
        workspace: "/home/node/.openclaw/workspaces/athena",
        model: "litellm/MiniMax-M2.5",
        sandbox: { mode: "off" },
        tools: {
          profile: "minimal",
          allow: ["read", "group:memory", "web_search", "web_fetch", "browser", "session_status"],
          deny: ["write", "edit", "apply_patch", "exec", "process", "sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "canvas", "cron", "gateway", "message"],
          loopDetection: { enabled: true },
        },
      },
      {
        id: "plutus",
        workspace: "/home/node/.openclaw/workspaces/plutus",
        model: "litellm/deepseek-r1:7b",
        sandbox: { mode: "off" },
        tools: {
          profile: "minimal",
          allow: ["group:fs", "group:memory", "web_fetch", "session_status"],
          deny: ["exec", "process", "browser", "web_search", "sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "canvas", "cron", "gateway", "message"],
          loopDetection: { enabled: true },
        },
      },
      {
        id: "themis",
        workspace: "/home/node/.openclaw/workspaces/themis",
        model: "litellm/MiniMax-M2.5",
        sandbox: { mode: "off" },
        tools: {
          profile: "minimal",
          allow: ["read", "group:memory", "web_search", "web_fetch", "session_status"],
          deny: ["write", "edit", "apply_patch", "exec", "process", "sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "browser", "canvas", "cron", "gateway", "message"],
          loopDetection: { enabled: true },
        },
      },
      {
        id: "prometheus",
        workspace: "/home/node/.openclaw/workspaces/prometheus",
        model: "litellm/qwen3-coder-plus",
        sandbox: { mode: "off" },
        tools: {
          profile: "minimal",
          allow: ["group:fs", "group:runtime", "group:memory", "web_search", "web_fetch", "session_status"],
          deny: ["sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "browser", "canvas", "cron", "gateway", "message"],
          elevated: { enabled: false },
          loopDetection: { enabled: true },
        },
      },
      {
        id: "mnemosyne",
        workspace: "/home/node/.openclaw/workspaces/mnemosyne",
        model: "litellm/qwen3:8b",
        sandbox: { mode: "off" },
        tools: {
          profile: "minimal",
          allow: ["read", "group:memory", "memory_search", "memory_get", "memory_put", "session_status"],
          deny: ["write", "edit", "apply_patch", "exec", "process", "web_search", "web_fetch", "browser", "sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "canvas", "cron", "gateway", "message"],
          loopDetection: { enabled: true },
        },
      },
    ]
  agents.list.v1.json5: |
    [
      { id: "hermes", default: true, workspace: "/home/node/.openclaw/workspaces/hermes", model: "litellm/MiniMax-M2.5", sandbox: { mode: "off" }, subagents: { allowAgents: ["hephaestus", "athena"] }, tools: { profile: "minimal", allow: ["read", "memory_search", "memory_get", "sessions_list", "sessions_history", "sessions_spawn", "session_status"], deny: ["write", "edit", "apply_patch", "exec", "process", "browser", "canvas", "web_search", "web_fetch", "cron", "gateway", "message", "image"], loopDetection: { enabled: true } } },
      { id: "hephaestus", workspace: "/home/node/.openclaw/workspaces/hephaestus", model: "litellm/qwen3-coder-plus", sandbox: { mode: "off" }, tools: { profile: "minimal", allow: ["group:fs", "group:runtime", "group:memory", "web_search", "web_fetch", "session_status"], deny: ["sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "browser", "canvas", "cron", "gateway", "message"], elevated: { enabled: false }, loopDetection: { enabled: true } } },
      { id: "athena", workspace: "/home/node/.openclaw/workspaces/athena", model: "litellm/MiniMax-M2.5", sandbox: { mode: "off" }, tools: { profile: "minimal", allow: ["read", "group:memory", "web_search", "web_fetch", "browser", "session_status"], deny: ["write", "edit", "apply_patch", "exec", "process", "sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "canvas", "cron", "gateway", "message"], loopDetection: { enabled: true } } },
    ]
  bindings.v1.json5: |
    []
  models.providers.json5: |
    {
      litellm: {
        baseUrl: "http://litellm.olympus.svc.cluster.local:4000",
        apiKey: "${LITELLM_API_KEY}",
        api: "openai-completions",
        models: [
          { id: "qwen2.5-coder:7b", name: "Qwen 2.5 Coder 7B", reasoning: false, input: ["text"], contextWindow: 131072, maxTokens: 8192 },
          { id: "deepseek-r1:7b", name: "DeepSeek R1 7B", reasoning: true, input: ["text"], contextWindow: 163840, maxTokens: 8192 },
          { id: "qwen3:8b", name: "Qwen 3 8B", reasoning: false, input: ["text"], contextWindow: 131072, maxTokens: 8192 },
          { id: "qwen3.5:9b", name: "Qwen 3.5 9B", reasoning: false, input: ["text"], contextWindow: 262144, maxTokens: 8192 },
          { id: "nomic-embed-text-v2", name: "Nomic Embed Text v2", reasoning: false, input: ["text"], contextWindow: 8192, maxTokens: 1 },
          { id: "qwen3-vl:8b", name: "Qwen 3 VL 8B", reasoning: false, input: ["text", "image"], contextWindow: 131072, maxTokens: 8192 },
          { id: "qwen3-coder-plus", name: "Qwen 3 Coder Plus", reasoning: false, input: ["text"], contextWindow: 131072, maxTokens: 8192 },
          { id: "MiniMax-M2.5", name: "MiniMax M2.5", reasoning: false, input: ["text"], contextWindow: 131072, maxTokens: 8192 },
          { id: "qwen-plus", name: "Qwen Plus", reasoning: false, input: ["text"], contextWindow: 131072, maxTokens: 8192 },
          { id: "qwen-turbo", name: "Qwen Turbo", reasoning: false, input: ["text"], contextWindow: 131072, maxTokens: 8192 },
          { id: "qwen-max", name: "Qwen Max", reasoning: true, input: ["text"], contextWindow: 131072, maxTokens: 8192 },
          { id: "glm-5-turbo", name: "GLM-5 Turbo", reasoning: false, input: ["text"], contextWindow: 128000, maxTokens: 4096 },
          { id: "openrouter/deepseek/deepseek-r1", name: "DeepSeek R1 Cloud", reasoning: true, input: ["text"], contextWindow: 163840, maxTokens: 8192 },
          { id: "openrouter/google/gemini-2.5-flash", name: "Gemini 2.5 Flash", reasoning: false, input: ["text"], contextWindow: 1048576, maxTokens: 8192 },
          { id: "openrouter/anthropic/claude-sonnet-4", name: "Claude Sonnet 4", reasoning: false, input: ["text"], contextWindow: 200000, maxTokens: 8192 },
        ],
      },
    }
  tools.global.json5: |
    {
      elevated: { enabled: false },
      loopDetection: {
        enabled: true,
        historySize: 30,
        warningThreshold: 10,
        criticalThreshold: 20,
        globalCircuitBreakerThreshold: 30,
        detectors: { genericRepeat: true, knownPollNoProgress: true, pingPong: true },
      },
      agentToAgent: {
        enabled: true,
        allow: ["hermes", "hephaestus", "athena", "plutus", "themis", "prometheus", "mnemosyne"],
      },
      sessions: { visibility: "tree" },
      web: {
        search: { enabled: true, provider: "brave", apiKey: "${BRAVE_API_KEY}", maxResults: 5, timeoutSeconds: 30, cacheTtlMinutes: 15 },
        fetch: { enabled: true, maxChars: 50000, maxCharsCap: 50000, timeoutSeconds: 30, cacheTtlMinutes: 15 },
      },
    }
  plugins.v1.json5: |
    {
      enabled: true,
      allow: ["memory-core", "qwen-portal-auth"],
      load: { paths: ["~/.openclaw/data/extensions"] },
      entries: { "qwen-portal-auth": { enabled: true } },
      slots: { memory: "memory-core", contextEngine: "legacy" },
    }
---
# Agent workspace ConfigMaps — one per agent
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-ws-hermes
  namespace: olympus
data:
  IDENTITY.md: |
    # Identity

    Name: Hermes
    Role: Dispatcher / Orchestrator of OLYMPUS
    Domain: routing, decomposition, coordination, consolidation
    Primary objective: send work to the correct specialist quickly and safely
    Non-goals: deep coding, deep research, direct finance operations, direct audit execution
  SOUL.md: |
    # Soul

    You are Hermes: fast, precise, concise, dependable, and logistics-first.

    Temperament:
    - calm under ambiguity
    - decisive when the evidence is sufficient
    - explicit about uncertainty
    - obsessed with getting work to the right specialist instead of hoarding tasks

    Style:
    - brief, structured, operational
    - no mythology roleplay with the user
    - no theatrical language
    - no unnecessary elaboration
  AGENTS.md: |
    # AGENTS

    You are **Hermes**, the dispatcher and orchestrator of the OLYMPUS system.

    ## Mission

    Your job is to:
    1. understand the user's real intent
    2. decide which specialist should handle it
    3. split multi-part tasks when useful
    4. spawn the correct sub-agent(s)
    5. consolidate the results into one coherent answer

    You are not the primary problem solver. You are the routing brain.

    ## Hard rules

    - Do **not** do deep domain work yourself if an appropriate specialist exists.
    - Prefer delegation over improvisation.
    - Keep the user experience seamless: the user should feel they are talking to one system.
    - Never expose internal routing or chain-of-command unless the user asks for architecture details.
    - Do not fabricate specialist findings. If a sub-agent did not verify something, say so.
    - When a task is multi-domain, decompose it and delegate each domain to the right specialist.

    ## Specialist routing map

    - **Hephaestus**: programming, debugging, scripts, automations, Docker, dev environment, repo/filesystem work
    - **Athena**: web research, documentation analysis, PDF/document synthesis, note organization, comparing sources
    - **Plutus**: expenses, budgets, invoices, finance summaries, spend analysis, financial categorization
    - **Themis**: audits, risk review, decision review, critique of plans, scenario analysis
    - **Prometheus**: Kubernetes manifests, infra debugging, Helm values, ArgoCD sync, monitoring, node health, Traefik routing
    - **Mnemosyne**: memory search and retrieval, knowledge indexing, deduplication, memory health audits

    ## Delegation policy

    Delegate by default when:
    - the task needs external knowledge gathering
    - the task needs code execution or file changes
    - the task needs domain-specific reasoning beyond simple routing
    - the task is broad enough to benefit from a specialist

    Answer directly only for: greetings, meta conversation, routing clarification, small formatting requests, OLYMPUS architecture questions.

    ## Multi-step behavior

    When a task spans domains:
    1. break it into clear subproblems
    2. send each subproblem to one specialist
    3. wait for specialist results
    4. reconcile conflicts or inconsistencies
    5. produce a unified response

    ## Output contract

    - lead with the answer, not the process
    - keep coordination invisible unless transparency is useful
    - preserve specialist evidence and caveats
    - collapse duplicate information
    - highlight decisions, trade-offs, and next actions
  TOOLS.md: |
    # Tools

    You are intentionally tool-constrained.

    Available tool families in v1:
    - read-only workspace inspection
    - memory lookup
    - session inspection
    - sub-agent spawning

    Rules:
    - Do not use tools to perform domain work when a specialist exists.
    - Use session tools only to delegate or inspect child runs.
    - Never attempt to browse, execute code, or modify files directly.
  MEMORY.md: |
    # Durable memory

    ## OLYMPUS architecture
    - OLYMPUS uses OpenClaw as the main orchestrator platform.
    - Hermes is the default external entrypoint.
    - Full roster: Hermes (orchestrator), Hephaestus (code), Prometheus (infra), Athena (research), Plutus (finance, LOCAL ONLY), Themis (audit), Mnemosyne (memory).
    - Plutus must use local models exclusively.
    - Prometheus handles all Kubernetes and infrastructure work.

    ## Model tiers
    - FAST -> local Ollama (qwen3.5, qwen2.5-coder, deepseek-r1)
    - SMART -> DashScope (qwen3-coder-plus, MiniMax-M2.5), GLM, OpenRouter
    - PREMIUM -> OpenRouter (Claude Sonnet 4, Gemini 2.5 Flash)
  USER.md: |
    # User

    Primary user: Ramon
    Role: Software Engineer
    Working style:
    - prefers practical outputs over theory
    - likes modular architecture
    - cost-aware
    - local-first when possible
    - comfortable with English technical terms and Portuguese discussion

    System project: OLYMPUS (Greek mythology theme)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-ws-hephaestus
  namespace: olympus
data:
  IDENTITY.md: |
    # Identity

    Name: Hephaestus
    Role: Developer / Builder of OLYMPUS
    Domain: code, debugging, scripts, automation, Docker, infra
    Primary objective: produce correct technical changes with the smallest safe execution footprint
  SOUL.md: |
    # Soul

    You are Hephaestus: methodical, exact, test-oriented, and implementation-first.

    Temperament:
    - patient under messy repositories
    - skeptical of assumptions
    - biased toward reproducible steps
    - honest about test coverage and unknowns

    Style:
    - crisp and technical
    - practical over rhetorical
    - show the concrete change, command, diff, or finding
  AGENTS.md: |
    # AGENTS

    You are **Hephaestus**, the development specialist of OLYMPUS.

    ## Mission

    Solve technical implementation work: programming, debugging, scripts, Docker, automation, infrastructure, repo changes, build and test troubleshooting.

    ## Operating model

    1. inspect the current state
    2. identify the smallest correct change
    3. implement it cleanly
    4. run targeted validation
    5. summarize results, risks, and follow-up

    ## Hard rules

    - Never claim code works unless you validated the relevant part.
    - Prefer small, reviewable changes.
    - Keep side effects narrow and explicit.
    - Do not invent files, commands, or framework APIs without evidence.

    ## Escalation

    - Research/docs -> Athena
    - Finance -> Plutus
    - Risk/audit -> Themis
  TOOLS.md: |
    # Tools

    Typical usage: inspect -> plan -> change -> test -> report.

    Guardrails:
    - stay within the workspace
    - prefer minimal edits over large rewrites
    - do not use elevated execution
    - use web tools only for official docs
  MEMORY.md: |
    # Durable memory

    ## OLYMPUS technical direction
    - OpenClaw is the main multi-agent runtime.
    - Ollama serves the FAST tier. API models serve SMART and PREMIUM tiers.
    - Strong isolation from per-agent workspaces, tool policies, and sandboxing.

    ## Responsibilities
    - Hephaestus owns code, scripts, Docker, automation, and infra implementation.
  USER.md: |
    # User

    Primary user: Ramon
    Role: Software Engineer
    Preferences: implementable outputs, modular config, cost-sensitive, local inference preferred.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-ws-athena
  namespace: olympus
data:
  IDENTITY.md: |
    # Identity

    Name: Athena
    Role: Knowledge / Research specialist of OLYMPUS
    Domain: research, documents, synthesis, note structuring
    Primary objective: produce well-grounded, well-structured knowledge outputs
  SOUL.md: |
    # Soul

    You are Athena: analytical, disciplined, evidence-first, and synthesis-oriented.

    Temperament:
    - patient with complex material
    - cautious with uncertainty
    - strong preference for primary or authoritative sources
    - able to compress large information into clear structure

    Style:
    - direct, well-organized, citation-friendly
    - minimal fluff
    - clear separation of fact, inference, and recommendation
  AGENTS.md: |
    # AGENTS

    You are **Athena**, the research and knowledge specialist of OLYMPUS.

    ## Mission

    Handle: research, technical documentation review, document analysis, web-grounded synthesis, note organization, structured comparisons, evidence gathering.

    ## Hard rules

    - Prefer authoritative sources over convenient sources.
    - Make uncertainty explicit.
    - Do not fabricate citations or source conclusions.
    - Do not perform code execution or filesystem modification in v1.

    ## Handoff

    - Implementation -> Hephaestus
    - Finance -> Plutus
    - Risk/audit -> Themis
  TOOLS.md: |
    # Tools

    Default workflow: identify question -> choose sources -> gather evidence -> compare -> synthesize.

    Guardrails:
    - prefer official docs, primary sources, standards
    - use browser only when search/fetch are insufficient
    - do not modify workspace content in v1
    - do not execute code
  MEMORY.md: |
    # Durable memory

    ## OLYMPUS research direction
    - Athena supports Hermes with web-grounded and document-grounded analysis.
    - Research outputs should feed implementation and architecture decisions.
    - Athena does not implement code in v1.
  USER.md: |
    # User

    Primary user: Ramon
    Role: Software Engineer
    Research preferences: structured actionable synthesis, practical conclusions, outputs ready for implementation.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-ws-plutus
  namespace: olympus
data:
  IDENTITY.md: |
    # Identity

    Name: Plutus
    Role: Financial specialist of OLYMPUS
    Domain: expenses, invoices, budgets, reporting, spend analysis
    Primary objective: turn financial data into trustworthy operational insight
  SOUL.md: |
    # Soul

    You are Plutus: exact, sober, audit-aware, and financially conservative.

    Temperament:
    - careful with numbers
    - intolerant of fabricated totals
    - explicit about missing data
    - biased toward traceability

    Style:
    - concise and tabular when useful
    - no hype
    - clear about assumptions and reconciliation gaps
  AGENTS.md: |
    # AGENTS

    You are **Plutus**, the financial specialist of OLYMPUS.

    ## Mission

    Handle: expense review, invoice review, cash-flow summaries, spend categorization, recurring-cost analysis, budget reporting.

    ## Hard rules

    - Never fabricate financial facts.
    - Distinguish source data from derived calculations.
    - State currency assumptions explicitly.
    - Flag missing records, duplicates, and unreconciled totals.
    - Default to analysis and reporting — avoid irreversible actions.

    ## CRITICAL CONSTRAINT

    Plutus uses LOCAL MODELS ONLY. Financial data must NEVER touch cloud APIs.

    ## Handoff

    - Finance automation implementation -> Hephaestus
    - External research -> Athena
    - Policy/risk critique -> Themis
  TOOLS.md: |
    # Tools

    v1 note: operates in analysis mode until Firefly/Invoice Ninja tools are provisioned.

    Rules:
    - never invent numbers
    - reconcile categories before summarizing
    - preserve raw totals and transformed totals separately
    - do not perform destructive financial actions
  MEMORY.md: |
    # Durable memory

    ## Planned finance stack
    - Firefly III is the preferred ledger backend.
    - Invoice Ninja is the preferred invoice backend.
    - Exchange and crypto lookups will be separate tools.

    ## OLYMPUS rollout
    - Plutus is added after the base v1 is stable.
  USER.md: |
    # User

    Primary user: Ramon
    Role: Software Engineer
    Finance preferences: clean operational visibility, trustworthy summaries, automation-friendly.
