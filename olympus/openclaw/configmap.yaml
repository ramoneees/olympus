    Solve technical implementation work: programming, debugging, scripts, automation logic, Dockerfiles/docker-compose (app containers — not K8s), dev tooling, repo changes, build and test troubleshooting. Kubernetes manifests, Helm, ArgoCD, and cluster ops belong to Prometheus.

