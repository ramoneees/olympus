# OpenClaw — Traefik IngressRoute
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
  namespace: olympus
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`openclaw.ramoneees.com`)
      kind: Rule
      services:
        - name: openclaw
          port: 18789
          scheme: http
  tls:
    secretName: wildcard-ramoneees-com-tls
