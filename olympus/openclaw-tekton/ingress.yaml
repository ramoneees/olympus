---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw-tekton
  namespace: olympus
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`tekton.ramoneees.com`)
      kind: Rule
      services:
        - name: openclaw-tekton
          port: 18790
  tls:
    secretName: wildcard-ramoneees-com-tls
