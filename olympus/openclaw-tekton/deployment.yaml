# OpenClaw Tekton — coding-focused agent team for Paperclip orchestration
# Separate OpenClaw instance dedicated to the dev company
# Secret is in secrets.yaml (applied manually, not tracked in git)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-tekton-data
  namespace: olympus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-tekton
  namespace: olympus
  labels:
    app: openclaw-tekton
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw-tekton
  template:
    metadata:
      labels:
        app: openclaw-tekton
    spec:
      nodeSelector:
        kubernetes.io/hostname: olympus
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ['sh', '-c', 'chown -R 1000:1000 /home/node/.openclaw']
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
        - name: install-config
          image: busybox
          command:
            - sh
            - -c
            - |
              # Copy config from ConfigMap to data volume
              mkdir -p /home/node/.openclaw/config
              cp /config-src/openclaw.json /home/node/.openclaw/openclaw.json
              # Download gitea-mcp binary (official Gitea MCP server)
              GITEA_MCP_VER="v0.2.0"
              curl -fsSL "https://gitea.com/gitea/gitea-mcp/releases/download/${GITEA_MCP_VER}/gitea-mcp-linux-amd64" \
                -o /home/node/.openclaw/gitea-mcp \
                && chmod +x /home/node/.openclaw/gitea-mcp
              # Create workspace directories for each agent
              for agent in apollo daedalus vulcan arachne cyclops argos metis; do
                mkdir -p /home/node/.openclaw/workspaces/$agent
              done
              # Create shared directories
              mkdir -p /home/node/.openclaw/memory
              mkdir -p /home/node/.openclaw/cron
              mkdir -p /home/node/.openclaw/data/extensions
              mkdir -p /home/node/.openclaw/npm-global
              # Generate kubeconfig for Kubernetes MCP
              KUBE_TOKEN=$(cat /var/run/secrets/mcp-kubernetes/token)
              KUBE_CA=$(cat /var/run/secrets/mcp-kubernetes/ca.crt)
              cat > /home/node/.openclaw/kubeconfig << EOFKUBE
              apiVersion: v1
              kind: Config
              clusters:
              - cluster:
                  certificate-authority-data: $(echo $KUBE_CA | base64 -w0)
                  server: https://kubernetes.default.svc
                name: olympus
              contexts:
              - context:
                  cluster: olympus
                  user: mcp-kubernetes
                name: default
              current-context: default
              users:
              - name: mcp-kubernetes
                user:
                  token: $KUBE_TOKEN
              EOFKUBE
              # Copy workspace files (only if not exist to preserve runtime changes)
              for agent in apollo daedalus vulcan arachne cyclops argos metis; do
                for file in IDENTITY SOUL TOOLS AGENTS USER HEARTBEAT; do
                  [ -f /home/node/.openclaw/workspaces/$agent/${file}.md ] || \
                    cp /workspace-src/$agent-${file}.md /home/node/.openclaw/workspaces/$agent/${file}.md 2>/dev/null || true
                done
              done
              chown -R 1000:1000 /home/node/.openclaw
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: tekton-config
              mountPath: /config-src
            - name: mcp-k8s-token
              mountPath: /var/run/secrets/mcp-kubernetes
              readOnly: true
            - name: tekton-workspaces
              mountPath: /workspace-src
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - name: gateway
              containerPort: 18790
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: mcp-k8s-token
              mountPath: /var/run/secrets/mcp-kubernetes
              readOnly: true
            - name: docker-sock
              mountPath: /var/run/docker.sock
          env:
            # LiteLLM (model routing)
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: litellm-api-key
            # Gateway auth
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: gateway-token
            # Hooks auth (must differ from gateway token)
            - name: OPENCLAW_HOOKS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: hooks-token
            # Brave web search
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: brave-api-key
            # Gitea access for agents
            - name: GITEA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: gitea-token
            # Per-agent Gitea tokens
            - name: GITEA_TOKEN_APOLLO
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: gitea-token-apollo
            - name: GITEA_TOKEN_DAEDALUS
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: gitea-token-daedalus
            - name: GITEA_TOKEN_VULCAN
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: gitea-token-vulcan
            - name: GITEA_TOKEN_ARACHNE
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: gitea-token-arachne
            - name: GITEA_TOKEN_CYCLOPS
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: gitea-token-cyclops
            - name: GITEA_TOKEN_ARGOS
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: gitea-token-argos
            - name: GITEA_TOKEN_METIS
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: gitea-token-metis
            # ZAI MCP services
            - name: Z_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-tekton-secret
                  key: z-ai-api-key
            # Kubernetes MCP for Cyclops
            - name: KUBECONFIG
              value: /home/node/.openclaw/kubeconfig
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-tekton-data
        - name: tekton-config
          configMap:
            name: openclaw-tekton-config
        - name: mcp-k8s-token
          secret:
            secretName: mcp-kubernetes-token
        - name: tekton-workspaces
          configMap:
            name: openclaw-tekton-workspaces
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-tekton
  namespace: olympus
spec:
  type: ClusterIP
  selector:
    app: openclaw-tekton
  ports:
    - name: gateway
      port: 18790
      targetPort: 18790
