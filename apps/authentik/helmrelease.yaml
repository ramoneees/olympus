apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: apps
spec:
  interval: 10m
  chart:
    spec:
      chart: authentik
      version: "2024.*"
      sourceRef:
        kind: HelmRepository
        name: goauthentik
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: authentik-helm-values
