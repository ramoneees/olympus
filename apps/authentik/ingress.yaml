---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.ramoneees.com`)
      kind: Rule
      services:
        - name: authentik-server
          port: 80
  tls:
    secretName: wildcard-ramoneees-com-tls
