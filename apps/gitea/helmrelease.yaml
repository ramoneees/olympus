apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: apps
spec:
  interval: 10m
  chart:
    spec:
      chart: gitea
      version: "10.*"
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: gitea-helm-values
