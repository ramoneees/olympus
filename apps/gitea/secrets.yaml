# TEMPLATE — replace placeholders before applying
# These secrets must exist before Gitea starts
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin-secret
  namespace: apps
type: Opaque
stringData:
  username: "<GITEA_ADMIN_USER>"
  password: "<GITEA_ADMIN_PASSWORD>"
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-db-secret
  namespace: apps
type: Opaque
stringData:
  password: "<GITEA_DB_PASSWORD>"
