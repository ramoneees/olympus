---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  namespace: apps
  labels:
    app: cloudbeaver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cloudbeaver
  template:
    metadata:
      labels:
        app: cloudbeaver
    spec:
      containers:
        - name: cloudbeaver
          image: dbeaver/cloudbeaver:latest
          ports:
            - name: http
              containerPort: 8978
          volumeMounts:
            - name: data
              mountPath: /opt/cloudbeaver/workspace
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cloudbeaver-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloudbeaver-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cloudbeaver
  namespace: apps
spec:
  type: ClusterIP
  selector:
    app: cloudbeaver
  ports:
    - name: http
      port: 8978
      targetPort: 8978
