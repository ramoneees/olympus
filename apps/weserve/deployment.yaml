---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weserve
  namespace: apps
  labels:
    app: weserve
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: weserve
  template:
    metadata:
      labels:
        app: weserve
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      containers:
        - name: weserve
          image: git.ramoneees.com/ramoneees/weserve:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgresql.databases.svc.cluster.local:5432/team_organizer"
            - name: SPRING_DATASOURCE_USERNAME
              value: "weserve"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: weserve-secret
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: weserve-secret
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: weserve
  namespace: apps
spec:
  type: ClusterIP
  selector:
    app: weserve
  ports:
    - name: http
      port: 8080
      targetPort: 8080
