apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost
  namespace: apps
spec:
  interval: 10m
  chart:
    spec:
      chart: mattermost-team-edition
      version: "6.*"
      sourceRef:
        kind: HelmRepository
        name: mattermost
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: mattermost-helm-values
