---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefly-iii
  namespace: apps
  labels:
    app: firefly-iii
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: firefly-iii
  template:
    metadata:
      labels:
        app: firefly-iii
    spec:
      containers:
        - name: firefly-iii
          image: fireflyiii/core:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_URL
              value: "https://firefly.ramoneees.com"
            - name: TRUSTED_PROXIES
              value: "**"
            - name: DB_CONNECTION
              value: "mysql"
            - name: DB_HOST
              value: "mariadb.databases.svc.cluster.local"
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: "firefly"
            - name: DB_USERNAME
              value: "firefly"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: firefly-secret
                  key: db-password
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: firefly-secret
                  key: app-key
            - name: STATIC_CRON_TOKEN
              valueFrom:
                secretKeyRef:
                  name: firefly-secret
                  key: cron-token
            - name: ENABLE_EXCHANGE_RATES
              value: "true"
          volumeMounts:
            - name: upload
              mountPath: /var/www/html/storage/upload
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: upload
          persistentVolumeClaim:
            claimName: firefly-upload
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firefly-upload
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: firefly-iii
  namespace: apps
spec:
  type: ClusterIP
  selector:
    app: firefly-iii
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: firefly-iii-cron
  namespace: apps
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cron
              image: curlimages/curl:latest
              command:
                - sh
                - -c
                - 'curl -fsS "http://firefly-iii.apps.svc.cluster.local:8080/api/v1/cron/$(CRON_TOKEN)"'
              env:
                - name: CRON_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: firefly-secret
                      key: cron-token
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: firefly-iii-exchange-rates
  namespace: apps
spec:
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: exchange-rates
              image: curlimages/curl:latest
              command:
                - sh
                - -c
                - |
                  set -e
                  FIREFLY_URL="http://firefly-iii.apps.svc.cluster.local:8080"
                  PAIRS="BRL,USD,GBP"
                  DATE=$(date -u +%Y-%m-%d)

                  # Fetch rates from ECB via frankfurter.app (EUR base)
                  RATES=$(curl -fsS "https://api.frankfurter.app/${DATE}?from=EUR&to=${PAIRS}")
                  echo "Fetched rates: ${RATES}"

                  # Parse and push each pair to Firefly III
                  for CURRENCY in $(echo "$PAIRS" | tr ',' ' '); do
                    RATE=$(echo "$RATES" | sed -n "s/.*\"${CURRENCY}\":\([0-9.]*\).*/\1/p")
                    if [ -n "$RATE" ]; then
                      echo "Setting EUR -> ${CURRENCY} = ${RATE} for ${DATE}"
                      curl -fsS -X POST "${FIREFLY_URL}/api/v1/exchange-rates" \
                        -H "Authorization: Bearer ${API_TOKEN}" \
                        -H "Accept: application/json" \
                        -H "Content-Type: application/json" \
                        -d "{\"from\":\"EUR\",\"to\":\"${CURRENCY}\",\"date\":\"${DATE}\",\"rate\":${RATE}}"
                      echo ""
                    else
                      echo "WARNING: No rate found for ${CURRENCY}"
                    fi
                  done
                  echo "Exchange rates updated successfully"
              env:
                - name: API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: firefly-secret
                      key: api-token
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
          restartPolicy: OnFailure
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefly-iii-importer
  namespace: apps
  labels:
    app: firefly-iii-importer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: firefly-iii-importer
  template:
    metadata:
      labels:
        app: firefly-iii-importer
    spec:
      containers:
        - name: importer
          image: fireflyiii/data-importer:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: FIREFLY_III_URL
              value: "http://firefly-iii.apps.svc.cluster.local:8080"
            - name: VANITY_URL
              value: "https://firefly.ramoneees.com"
            - name: TRUSTED_PROXIES
              value: "**"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: firefly-iii-importer
  namespace: apps
spec:
  type: ClusterIP
  selector:
    app: firefly-iii-importer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: firefly-iii-nodeport
  namespace: apps
spec:
  type: NodePort
  selector:
    app: firefly-iii
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30568
