apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenacitos-mission-control
  namespace: olympus
  labels:
    app: tenacitos-mission-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenacitos-mission-control
  template:
    metadata:
      labels:
        app: tenacitos-mission-control
    spec:
      nodeSelector:
        kubernetes.io/hostname: olympus
      containers:
      - name: mission-control
        image: git.ramoneees.com/ramoneees/olympus-mission-control/tenacitos:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tenacitos-config
              key: admin-password
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: tenacitos-config
              key: auth-secret
        - name: OPENCLAW_DIR
          value: "/openclaw"
        - name: NEXT_PUBLIC_AGENT_NAME
          value: "OLYMPUS Mission Control"
        - name: NEXT_PUBLIC_AGENT_EMOJI
          value: "🏛️"
        - name: NEXT_PUBLIC_AGENT_DESCRIPTION
          value: "Mission Control Dashboard for OLYMPUS Multi-Agent System"
        - name: NEXT_PUBLIC_OWNER_USERNAME
          value: "ramoneees"
        - name: NEXT_PUBLIC_COMPANY_NAME
          value: "OLYMPUS INFRASTRUCTURE"
        - name: NEXT_PUBLIC_APP_TITLE
          value: "OLYMPUS Mission Control"
        volumeMounts:
        - name: openclaw-data
          mountPath: /openclaw
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: openclaw-data
        hostPath:
          path: /root/.openclaw
          type: Directory