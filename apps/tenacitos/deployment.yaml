apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenacitos-mission-control
  namespace: tenacitos
  labels:
    app: tenacitos-mission-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenacitos-mission-control
  template:
    metadata:
      labels:
        app: tenacitos-mission-control
    spec:
      containers:
      - name: mission-control
        image: git.ramoneees.com/ramoneees/olympus-mission-control/tenacitos:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tenacitos-config
              key: admin-password
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: tenacitos-config
              key: auth-secret
        - name: OPENCLAW_DIR
          value: "/openclaw"
        volumeMounts:
        - name: openclaw-data
          mountPath: /openclaw
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: openclaw-data
        hostPath:
          path: /root/.openclaw
          type: Directory