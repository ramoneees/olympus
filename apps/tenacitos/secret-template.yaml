# Secret template - DO NOT COMMIT REAL VALUES
# This is a template for the tenacitos configuration secret
# To use: copy this file, encode your values with base64, and apply manually
#
# Example:
# echo -n "your-secure-password" | base64
# echo -n "your-auth-secret" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: tenacitos-config
  namespace: olympus
type: Opaque
data:
  # These values should be base64 encoded
  # admin-password: <base64-encoded-admin-password>
  # auth-secret: <base64-encoded-auth-secret>
  admin-password: ""
  auth-secret: ""