apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: apps
data:
  settings.yml: |
    use_default_settings: true

    server:
      bind_address: "0.0.0.0:8080"
      secret_key: "olympus-searxng-internal-only"
      limiter: false
      image_proxy: false
      method: GET

    ui:
      static_use_hash: true
      default_locale: en
      query_in_title: true

    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "en"
      formats:
        - html
        - json

    engines:
      - name: google
        engine: google
        disabled: false
      - name: bing
        engine: bing
        disabled: false
      - name: duckduckgo
        engine: duckduckgo
        disabled: false
      - name: wikipedia
        engine: wikipedia
        disabled: false
      - name: brave
        engine: brave
        disabled: false

    outgoing:
      request_timeout: 5.0
      max_request_timeout: 10.0

    enabled_plugins:
      - Hash plugin
      - Search on category select
      - Hostname replace
      - Tracker URL remover
