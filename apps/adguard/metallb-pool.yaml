# Dedicated MetalLB pool for AdGuard DNS at the existing LAN IP
# Keeps it separate from the general-purpose pool (192.168.50.200-220)
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: adguard-dns
  namespace: metallb-system
spec:
  addresses:
    - 192.168.50.2/32
  autoAssign: false  # Only assigned explicitly via annotation
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: adguard-dns-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - adguard-dns
