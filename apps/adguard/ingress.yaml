# Traefik IngressRoute for AdGuard Home web UI
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adguard-home
  namespace: adguard
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`adguard.ramoneees.com`)
      kind: Rule
      services:
        - name: adguard-http
          port: 80
  tls:
    secretName: wildcard-ramoneees-com-tls
