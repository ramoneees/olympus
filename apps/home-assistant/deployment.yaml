---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-config
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: apps
  labels:
    app: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: olympus
      initContainers:
        - name: seed-config
          image: busybox
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/configuration.yaml ]; then
                cat > /config/configuration.yaml << 'YAML'
              homeassistant:
                name: Olympus Home
                unit_system: metric
                time_zone: Europe/Lisbon

              http:
                server_port: 8123
                use_x_forwarded_for: true
                trusted_proxies:
                  - 10.42.0.0/16
                  - 10.43.0.0/16
                  - 192.168.50.0/24
                  - 127.0.0.1

              homekit:
                - name: "Olympus Bridge"
                  port: 21063
                  filter:
                    include_domains:
                      - light
                      - switch
                      - climate
                      - cover
                      - fan
                      - media_player
                      - sensor
                      - binary_sensor
                      - lock

              default_config:
              YAML
                echo "Seeded configuration.yaml with HomeKit bridge"
              else
                if ! grep -q "trusted_proxies" /config/configuration.yaml; then
                  cat >> /config/configuration.yaml << 'YAML'

              http:
                use_x_forwarded_for: true
                trusted_proxies:
                  - 10.42.0.0/16
                  - 10.43.0.0/16
                  - 192.168.50.0/24
                  - 127.0.0.1
              YAML
                  echo "Appended trusted_proxies"
                fi
                if ! grep -q "homekit:" /config/configuration.yaml; then
                  cat >> /config/configuration.yaml << 'YAML'

              homekit:
                - name: "Olympus Bridge"
                  port: 21063
                  filter:
                    include_domains:
                      - light
                      - switch
                      - climate
                      - cover
                      - fan
                      - media_player
                      - sensor
                      - binary_sensor
                      - lock
              YAML
                  echo "Appended homekit config"
                else
                  echo "Config already has homekit block, skipping"
                fi
              fi
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:stable
          ports:
            - name: http
              containerPort: 8123
            - name: homekit
              containerPort: 21063
          env:
            - name: TZ
              value: "Europe/Lisbon"
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /manifest.json
              port: http
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /manifest.json
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
  namespace: apps
spec:
  type: ClusterIP
  selector:
    app: home-assistant
  ports:
    - name: http
      port: 8123
      targetPort: 8123
