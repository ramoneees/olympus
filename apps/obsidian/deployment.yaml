# Obsidian Vault — git-sync + FileBrowser
# Source: github.com/ramoneees/obsidian-backups
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-vault
  namespace: apps
  labels:
    app: obsidian
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: obsidian
  template:
    metadata:
      labels:
        app: obsidian
    spec:
      initContainers:
        - name: git-init
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              git clone --depth 1 \
                https://$(cat /etc/git-token/token)@github.com/ramoneees/obsidian-backups.git \
                /vault
          volumeMounts:
            - name: vault
              mountPath: /vault
            - name: git-token
              mountPath: /etc/git-token
              readOnly: true
      containers:
        - name: git-sync
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              while true; do
                cd /vault
                git fetch --depth 1 origin main
                git reset --hard origin/main
                sleep 60
              done
          volumeMounts:
            - name: vault
              mountPath: /vault
            - name: git-token
              mountPath: /etc/git-token
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          args: ["--port", "8080"]
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: vault
              mountPath: /srv
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: vault
          emptyDir: {}
        - name: git-token
          secret:
            secretName: obsidian-sync-env
            items:
              - key: github-token
                path: token
---
apiVersion: v1
kind: Service
metadata:
  name: obsidian-vault
  namespace: apps
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: obsidian
