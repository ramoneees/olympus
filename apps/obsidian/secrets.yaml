# Obsidian sync secrets — placeholder template
# Apply manually with real values: kubectl apply -f secrets.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: obsidian-sync-env
  namespace: apps
type: Opaque
stringData:
  # GitHub PAT with repo read access to ramoneees/obsidian-backups
  github-token: "CHANGE_ME"

  # Mnemosyne pgvector database (used by CronJob sync)
  DB_HOST: "postgresql.databases.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "mnemosyne"
  DB_USER: "mnemosyne"
  DB_PASSWORD: "CHANGE_ME"

  # Embedding endpoint (LiteLLM → Ollama)
  EMBEDDING_URL: "http://litellm.olympus.svc.cluster.local:4000"
  EMBEDDING_MODEL: "bge-m3"
