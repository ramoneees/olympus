# Gitea Actions Runner (act_runner)
# Executes Gitea Actions workflows using Docker-in-Docker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-runner
  namespace: apps
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-runner-config
  namespace: apps
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: .runner
      capacity: 2
      timeout: 1h
      labels:
        - "ubuntu-latest:docker://node:22-bookworm"
        - "node-22:docker://node:22-bookworm"
        - "node-20:docker://node:20-bookworm"
    cache:
      enabled: true
      dir: /data/cache
    container:
      network: host
      privileged: false
      docker_host: tcp://localhost:2376
      options: >-
        -v /certs/client:/certs/client
        -e DOCKER_HOST=tcp://localhost:2376
        -e DOCKER_TLS_VERIFY=1
        -e DOCKER_CERT_PATH=/certs/client
      env:
        DOCKER_HOST: tcp://localhost:2376
        DOCKER_TLS_VERIFY: "1"
        DOCKER_CERT_PATH: /certs/client
      valid_volumes:
        - /data/cache
        - /certs/client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: apps
  labels:
    app: gitea-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
    spec:
      serviceAccountName: gitea-runner
      containers:
        - name: runner
          image: gitea/act_runner:0.2.11
          env:
            - name: GITEA_INSTANCE_URL
              value: "http://gitea-web.apps.svc.cluster.local:3000"
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-runner-secret
                  key: token
            - name: GITEA_RUNNER_NAME
              value: "olympus-runner"
            - name: CONFIG_FILE
              value: /config/config.yaml
            - name: DOCKER_HOST
              value: "tcp://localhost:2376"
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: /certs/client
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /config
              readOnly: true
            - name: docker-certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: dind-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: runner-data
          persistentVolumeClaim:
            claimName: gitea-runner-data
        - name: runner-config
          configMap:
            name: gitea-runner-config
        - name: docker-certs
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-runner-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
