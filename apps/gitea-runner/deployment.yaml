# Gitea Actions Runner (act_runner)
# Executes Gitea Actions workflows using Docker-in-Docker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-runner
  namespace: apps
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-runner-config
  namespace: apps
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: .runner
      capacity: 2
      timeout: 1h
      labels:
        - "ubuntu-latest:docker://node:22-bookworm"
        - "node-22:docker://node:22-bookworm"
        - "node-20:docker://node:20-bookworm"
    cache:
      enabled: true
      dir: /data/cache
    container:
      network: host
      privileged: false
      docker_host: "-"
      options: >-
        -v /run/docker/docker.sock:/var/run/docker.sock
      env:
        DOCKER_HOST: unix:///var/run/docker.sock
      valid_volumes:
        - /data/cache
        - /run/docker/docker.sock
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: apps
  labels:
    app: gitea-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
    spec:
      serviceAccountName: gitea-runner
      containers:
        - name: runner
          image: gitea/act_runner:0.2.11
          env:
            - name: GITEA_INSTANCE_URL
              value: "http://gitea-web.apps.svc.cluster.local:3000"
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-runner-secret
                  key: token
            - name: GITEA_RUNNER_NAME
              value: "olympus-runner"
            - name: CONFIG_FILE
              value: /config/config.yaml
            - name: DOCKER_HOST
              value: "unix:///run/docker/docker.sock"
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /config
              readOnly: true
            - name: docker-socket
              mountPath: /run/docker
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          command:
            - "dockerd-entrypoint.sh"
          args:
            - "--host=unix:///run/docker/docker.sock"
          volumeMounts:
            - name: docker-socket
              mountPath: /run/docker
            - name: dind-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: runner-data
          persistentVolumeClaim:
            claimName: gitea-runner-data
        - name: runner-config
          configMap:
            name: gitea-runner-config
        - name: docker-socket
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-runner-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
