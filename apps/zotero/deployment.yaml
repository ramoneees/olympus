---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zotero-library
  namespace: apps
  labels:
    app: zotero
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zotero
  template:
    metadata:
      labels:
        app: zotero
    spec:
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: library
              mountPath: /srv
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: zotero-library
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zotero-library
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zotero-library
  namespace: apps
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: zotero