# Flux Kustomization — OLYMPUS AI Stack
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: olympus
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: namespaces
    - name: infrastructure
    - name: databases
  sourceRef:
    kind: GitRepository
    name: olympus
  path: ./olympus
  prune: true
  timeout: 5m
