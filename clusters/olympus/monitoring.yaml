# Flux Kustomization — Monitoring (Prometheus, Loki, Promtail)
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: namespaces
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: olympus
  path: ./monitoring
  prune: true
  timeout: 5m
