# Flux Kustomization — Databases (PostgreSQL, MariaDB, Redis, Backups)
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: databases
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: namespaces
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: olympus
  path: ./databases
  prune: true
  timeout: 5m
