# ArgoCD Application — Infrastructure (Longhorn)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: "1.*"
    helm:
      valueFiles: []
      values: |
        # Inline values merged with values file from git
      # Values from git repo
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: "1.*"
      helm:
        valueFiles:
          - $values/infrastructure/longhorn/values.yaml
    - repoURL: https://git.ramoneees.com/ramoneees/olympus.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
