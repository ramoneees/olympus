---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: firefly-iii
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea-web.apps.svc.cluster.local:3000/ramoneees/olympus.git
    targetRevision: main
    path: apps/firefly-iii
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: firefly-secret
      jsonPointers:
        - /data/api-token
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
