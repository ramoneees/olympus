---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mattermost
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.mattermost.com
      chart: mattermost-team-edition
      targetRevision: "6.*"
      helm:
        valueFiles:
          - $values/apps/mattermost/values.yaml
    - repoURL: http://gitea-web.apps.svc.cluster.local:3000/ramoneees/olympus.git
      targetRevision: main
      ref: values
    - repoURL: http://gitea-web.apps.svc.cluster.local:3000/ramoneees/olympus.git
      targetRevision: main
      path: apps/mattermost
      directory:
        include: 'ingress.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
