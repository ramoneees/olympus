# ArgoCD Applications — Phase 5: OLYMPUS AI Stack
---
# NVIDIA GPU Operator (Helm chart)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gpu-operator
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.ngc.nvidia.com/nvidia
      chart: gpu-operator
      targetRevision: "v24.*"
      helm:
        valueFiles:
          - $values/infrastructure/gpu-operator/values.yaml
    - repoURL: http://gitea-web.apps.svc.cluster.local:3000/ramoneees/olympus.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: gpu-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
