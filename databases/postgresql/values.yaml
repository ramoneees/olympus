# PostgreSQL with pgvector — shared instance
# Chart: postgresql
# Repo: https://charts.bitnami.com/bitnami
#
# One database per service. Create databases after install:
#   kubectl exec -it postgresql-0 -n databases -- psql -U postgres
#   CREATE DATABASE gitea;
#   CREATE DATABASE authentik;
#   CREATE DATABASE mattermost;
#   CREATE DATABASE vikunja;
#   CREATE DATABASE litellm;
#   CREATE DATABASE n8n;
#   CREATE USER gitea WITH PASSWORD '...'; GRANT ALL ON DATABASE gitea TO gitea;
#   (repeat per service)

image:
  tag: latest

auth:
  existingSecret: postgresql-secret  # keys: postgres-password, replication-password
  database: postgres

primary:
  # pgvector extension — needed for Mnemosyne long-term memory
  initdb:
    scripts:
      init-extensions.sql: |
        CREATE EXTENSION IF NOT EXISTS vector;
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    enabled: true
  readinessProbe:
    enabled: true
  service:
    type: NodePort
    ports:
      postgresql: 5432
    nodePorts:
      postgresql: 30432

# Single node — no replication needed for homelab
architecture: standalone

metrics:
  enabled: true
  image:
    tag: latest
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
