# MariaDB daily logical backup — dumps each database individually
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mariadb-backup
  namespace: databases
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            fsGroup: 1001
          containers:
            - name: mariadb-backup
              image: bitnami/mariadb:latest
              env:
                - name: MARIADB_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-backup-credentials
                      key: mariadb-root-password
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  BACKUP_DIR=/backups/mariadb
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  DBHOST=mariadb.databases.svc.cluster.local
                  DBUSER=root

                  mkdir -p "$BACKUP_DIR"

                  # Retention: delete backups older than 7 days
                  find "$BACKUP_DIR" -name "*.sql.gz" -mtime +7 -delete
                  echo "Retention cleanup done."

                  DATABASES="nextcloud firefly invoiceninja"
                  FAILED=0
                  for db in $DATABASES; do
                    echo "Backing up $db..."
                    if mysqldump -h "$DBHOST" -u "$DBUSER" -p"${MARIADB_ROOT_PASSWORD}" --single-transaction "$db" 2>&1 | gzip > "$BACKUP_DIR/${db}-${TIMESTAMP}.sql.gz"; then
                      SIZE=$(du -h "$BACKUP_DIR/${db}-${TIMESTAMP}.sql.gz" | cut -f1)
                      echo "OK: $db ($SIZE)"
                    else
                      echo "FAILED: $db"
                      rm -f "$BACKUP_DIR/${db}-${TIMESTAMP}.sql.gz"
                      FAILED=1
                    fi
                  done

                  echo "---"
                  echo "Total backup size: $(du -sh "$BACKUP_DIR" | cut -f1)"
                  ls -lh "$BACKUP_DIR"/*-${TIMESTAMP}.sql.gz 2>/dev/null || true
                  exit $FAILED
              volumeMounts:
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: db-backups
